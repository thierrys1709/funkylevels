<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FunkyLevels — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#08080f;color:#e8e8ff;font-family:Rajdhani,sans-serif;min-height:100vh;}
nav{background:#06060ecc;border-bottom:1px solid #1e1e40;padding:0 24px;height:56px;display:flex;align-items:center;gap:12px;}
.nav-logo{font-family:Orbitron,monospace;font-size:14px;font-weight:900;color:#f0e040;letter-spacing:2px;text-decoration:none;margin-right:auto;}
.container{max-width:1100px;margin:0 auto;padding:32px 24px 80px;}
h1{font-family:Orbitron,monospace;font-size:16px;color:#f0e040;letter-spacing:2px;margin-bottom:24px;}

/* FILTERS */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;align-items:center;}
.filter-btn{font-family:Orbitron,monospace;font-size:9px;padding:8px 16px;border-radius:4px;cursor:pointer;border:1.5px solid #2a2a55;background:transparent;color:#6060aa;transition:all .15s;}
.filter-btn.active{background:#1a1a3a;color:#e8e8ff;border-color:#a040f0;}
.filter-btn.f-pending.active{border-color:#f0a040;color:#f0a040;}
.filter-btn.f-done.active{border-color:#40f090;color:#40f090;}
.filter-btn.f-spam.active{border-color:#f04060;color:#f04060;}
.search-box{flex:1;min-width:200px;background:#12122a;border:1.5px solid #2a2a55;border-radius:4px;color:#e8e8ff;font-family:Rajdhani,sans-serif;font-size:14px;padding:8px 14px;outline:none;}
.search-box:focus{border-color:#a040f0;}
.count-badge{font-family:Orbitron,monospace;font-size:9px;color:#6060aa;margin-left:auto;}

/* TABLE */
.msg-table{width:100%;border-collapse:collapse;}
.msg-table th{font-family:Orbitron,monospace;font-size:9px;color:#4040aa;letter-spacing:1px;padding:10px 14px;text-align:left;border-bottom:2px solid #1e1e40;white-space:nowrap;}
.msg-row{border-bottom:1px solid #1a1a35;transition:background .1s;cursor:pointer;}
.msg-row:hover{background:#0f0f20;}
.msg-row td{padding:14px;vertical-align:middle;font-size:13px;}
.td-date{color:#6060aa;white-space:nowrap;width:120px;}
.td-name{font-weight:700;color:#e8e8ff;width:160px;}
.td-email{color:#a0a0cc;width:200px;}
.td-subject{width:130px;}
.td-preview{color:#8080aa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:280px;}
.td-status{width:110px;}
.td-actions{width:120px;white-space:nowrap;}

/* STATUS BADGES */
.status-badge{font-family:Orbitron,monospace;font-size:8px;padding:4px 10px;border-radius:3px;cursor:pointer;border:1px solid;display:inline-block;}
.status-pending{background:#1a1200;color:#f0a040;border-color:#f0a040;}
.status-done{background:#0d2a1a;color:#40f090;border-color:#40f090;}
.status-spam{background:#2a0d14;color:#f04060;border-color:#f04060;}

/* SUBJECT BADGES */
.subj-badge{font-family:Orbitron,monospace;font-size:8px;padding:3px 8px;border-radius:3px;}
.subj-bug{background:#1a0d00;color:#f08040;border:1px solid #f08040;}
.subj-abuse{background:#2a0d14;color:#f04060;border:1px solid #f04060;}
.subj-rgpd{background:#0d0d2a;color:#6060f0;border:1px solid #6060f0;}
.subj-question{background:#0d1a1a;color:#40c0c0;border:1px solid #40c0c0;}
.subj-other{background:#1a1a1a;color:#8080aa;border:1px solid #8080aa;}

/* ACTION BTNS */
.act-btn{font-size:14px;background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:4px;transition:background .1s;}
.act-btn:hover{background:#2a2a55;}

/* DETAIL PANEL */
.expand-row td{padding:0;border-bottom:2px solid #a040f020;}
.expand-inner{background:#0d0d1e;border-left:3px solid #a040f0;padding:20px 24px;display:flex;gap:24px;flex-wrap:wrap;align-items:flex-start;}
.expand-info{flex:1;min-width:200px;}
.expand-name{font-family:Orbitron,monospace;font-size:13px;color:#e8e8ff;margin-bottom:4px;}
.expand-email{font-size:13px;color:#a040f0;margin-bottom:12px;}
.expand-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.expand-message{background:#12122a;border:1px solid #2a2a55;border-radius:6px;padding:14px;font-size:14px;color:#a0a0cc;line-height:1.7;white-space:pre-wrap;flex:2;min-width:300px;}
.expand-actions{display:flex;flex-direction:column;gap:8px;flex-shrink:0;}
.detail-btn{font-family:Orbitron,monospace;font-size:9px;padding:9px 16px;border-radius:4px;cursor:pointer;border:1.5px solid;transition:all .15s;white-space:nowrap;}
.btn-reply{background:#0d0d2a;border-color:#a040f0;color:#a040f0;}
.btn-reply:hover{background:#1a1a3a;}
.btn-done{background:#0d2a1a;border-color:#40f090;color:#40f090;}
.btn-done:hover{background:#1a3a2a;}
.btn-spam{background:#2a0d14;border-color:#f04060;color:#f04060;}
.btn-spam:hover{background:#3a1a1a;}
.btn-pending{background:#1a1200;border-color:#f0a040;color:#f0a040;}
.btn-pending:hover{background:#2a2000;}
.btn-close{background:#1a1a2a;border-color:#2a2a55;color:#6060aa;}
.btn-close:hover{background:#2a2a3a;}
.msg-row.expanded{background:#0f0f20;}
.empty{text-align:center;padding:60px;color:#4040aa;font-family:Orbitron,monospace;font-size:10px;}
.loading{text-align:center;padding:60px;color:#4040aa;font-family:Orbitron,monospace;font-size:10px;}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">⚡ FUNKYLEVELS ADMIN</a>
  <span id="nav-user" style="font-size:13px;color:#6060aa;"></span>
  <a href="index.html" style="font-family:Orbitron,monospace;font-size:9px;color:#6060aa;text-decoration:none;padding:8px 14px;border:1.5px solid #2a2a55;border-radius:4px;">← RETOUR</a>
</nav>

<div class="container">
  <h1>📨 MESSAGES DE CONTACT</h1>

  <div class="filters">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">TOUS</button>
    <button class="filter-btn f-pending" data-filter="pending" onclick="setFilter('pending')">⏳ EN ATTENTE</button>
    <button class="filter-btn f-done" data-filter="done" onclick="setFilter('done')">✅ TRAITÉS</button>
    <button class="filter-btn f-spam" data-filter="spam" onclick="setFilter('spam')">🚫 SPAM</button>
    <input type="text" class="search-box" id="search-box" placeholder="🔍 Rechercher..." oninput="renderTable()">
    <span class="count-badge" id="count-badge">0 message(s)</span>
  </div>

  <div id="table-wrap">
    <div class="loading">Chargement...</div>
  </div>
</div>



<script>
const SUPABASE_URL='https://ydpkyktfvpdnjjiewctf.supabase.co';
const SUPABASE_KEY='sb_publishable_q44xvrQ9qmYhv80WuCnAdg_aTkxslmD';

const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{realtime:{enabled:false}});

let allMessages=[];
let currentFilter='all';
let currentMsg=null;

const subjectLabels={bug:'🐛 Bug',abuse:'🚨 Abus',rgpd:'🔒 RGPD',question:'❓ Question',other:'💬 Autre'};
const subjectClass={bug:'subj-bug',abuse:'subj-abuse',rgpd:'subj-rgpd',question:'subj-question',other:'subj-other'};

function fmtDate(d){
  const dt=new Date(d);
  return dt.toLocaleDateString('fr-FR')+' '+dt.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}

async function loadMessages(){
  const token=getToken();
  if(!token){document.getElementById('table-wrap').innerHTML='<div class="empty">🔒 ACCÈS REFUSÉ</div>';return;}
  const r=await fetch(SUPABASE_URL+'/rest/v1/contact_messages?order=created_at.desc',{
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+token}
  });
  if(!r.ok){document.getElementById('table-wrap').innerHTML='<div class="empty">ERREUR DE CHARGEMENT</div>';return;}
  allMessages=await r.json();
  renderTable();
}

function getToken(){
  try{
    const key=Object.keys(localStorage).find(k=>k.includes('auth-token'));
    if(!key)return null;
    const obj=JSON.parse(localStorage.getItem(key));
    return obj?.access_token||obj?.currentSession?.access_token||null;
  }catch(e){return null;}
}

function setFilter(f){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.filter===f);
  });
  renderTable();
}

function renderTable(){
  const q=document.getElementById('search-box').value.toLowerCase();
  let msgs=allMessages.filter(m=>{
    if(currentFilter!=='all'&&(m.status||'pending')!==currentFilter)return false;
    if(q&&!m.name.toLowerCase().includes(q)&&!m.email.toLowerCase().includes(q)&&!m.message.toLowerCase().includes(q))return false;
    return true;
  });

  document.getElementById('count-badge').textContent=msgs.length+' message'+(msgs.length>1?'s':'');

  if(!msgs.length){
    document.getElementById('table-wrap').innerHTML='<div class="empty">AUCUN MESSAGE</div>';
    return;
  }

  const rows=msgs.map(m=>`
    <tr class="msg-row" data-id="${m.id}" onclick="openDetail('${m.id}')">
      <td class="td-date">${fmtDate(m.created_at)}</td>
      <td class="td-name">${esc(m.name)}</td>
      <td class="td-email">${esc(m.email)}</td>
      <td class="td-subject"><span class="subj-badge ${subjectClass[m.subject]||'subj-other'}">${subjectLabels[m.subject]||m.subject}</span></td>
      <td class="td-preview">${esc(m.message)}</td>
      <td class="td-status"><span class="status-badge status-${m.status||'pending'}">${statusLabel(m.status||'pending')}</span></td>
      <td class="td-actions">
        <button class="act-btn" title="Répondre" onclick="event.stopPropagation();replyDirect('${esc(m.email)}','${esc(m.name)}')">✉️</button>
        <button class="act-btn" title="Traité" onclick="event.stopPropagation();updateStatus('${m.id}','done')">✅</button>
        <button class="act-btn" title="SPAM" onclick="event.stopPropagation();updateStatus('${m.id}','spam')">🚫</button>
      </td>
    </tr>
  `).join('');

  document.getElementById('table-wrap').innerHTML=`
    <table class="msg-table">
      <thead><tr>
        <th>DATE</th><th>NOM</th><th>EMAIL</th><th>SUJET</th><th>MESSAGE</th><th>STATUT</th><th>ACTIONS</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function statusLabel(s){
  return s==='done'?'✅ TRAITÉ':s==='spam'?'🚫 SPAM':'⏳ ATTENTE';
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

let expandedId=null;

function openDetail(id){
  // Close existing expand if same row
  if(expandedId===id){closeDetail();return;}
  closeDetail();
  currentMsg=allMessages.find(m=>m.id===id);
  if(!currentMsg)return;
  expandedId=id;

  const tr=document.querySelector(`tr[data-id="${id}"]`);
  if(!tr)return;
  tr.classList.add('expanded');

  const colspan=7;
  const expandTr=document.createElement('tr');
  expandTr.className='expand-row';
  expandTr.id='expand-'+id;
  expandTr.innerHTML=`<td colspan="${colspan}">
    <div class="expand-inner">
      <div class="expand-info">
        <div class="expand-name">${esc(currentMsg.name)}</div>
        <div class="expand-email">${esc(currentMsg.email)}</div>
        <div class="expand-meta">
          <span class="subj-badge ${subjectClass[currentMsg.subject]||'subj-other'}">${subjectLabels[currentMsg.subject]||currentMsg.subject}</span>
          <span class="status-badge status-${currentMsg.status||'pending'}">${statusLabel(currentMsg.status||'pending')}</span>
          <span style="font-size:11px;color:#4040aa;">${fmtDate(currentMsg.created_at)}</span>
        </div>
      </div>
      <div class="expand-message">${esc(currentMsg.message)}</div>
      <div class="expand-actions">
        <button class="detail-btn btn-reply" onclick="replyTo()">✉️ RÉPONDRE</button>
        <button class="detail-btn btn-done" onclick="setStatus('done')">✅ TRAITÉ</button>
        <button class="detail-btn btn-pending" onclick="setStatus('pending')">⏳ EN ATTENTE</button>
        <button class="detail-btn btn-spam" onclick="setStatus('spam')">🚫 SPAM</button>
        <button class="detail-btn btn-close" onclick="closeDetail()">✕ FERMER</button>
      </div>
    </div>
  </td>`;

  tr.insertAdjacentElement('afterend', expandTr);
}

function closeDetail(){
  if(expandedId){
    const old=document.getElementById('expand-'+expandedId);
    if(old)old.remove();
    const tr=document.querySelector(`tr[data-id="${expandedId}"]`);
    if(tr)tr.classList.remove('expanded');
    expandedId=null;
    currentMsg=null;
  }
}

function replyTo(){
  if(!currentMsg)return;
  replyDirect(currentMsg.email,currentMsg.name);
}

function replyDirect(email,name){
  window.open(`mailto:${email}?subject=Re: FunkyLevels — Votre message&body=Bonjour ${name},%0A%0A`);
}

async function setStatus(status){
  if(!currentMsg)return;
  const id=currentMsg.id;
  await updateStatus(id,status);
  closeDetail();
}

async function updateStatus(id,status){
  const token=getToken();
  await fetch(SUPABASE_URL+'/rest/v1/contact_messages?id=eq.'+id,{
    method:'PATCH',
    headers:{
      'apikey':SUPABASE_KEY,
      'Authorization':'Bearer '+token,
      'Content-Type':'application/json',
      'Prefer':'return=minimal'
    },
    body:JSON.stringify({status})
  });
  const m=allMessages.find(m=>m.id===id);
  if(m)m.status=status;
  renderTable();
}

// Auth check
(async()=>{
  const{data}=await sb.auth.getSession();
  const ADMIN_UID='9f071976-8bc7-4ee5-90d3-8095160962e8';
  if(!data.session||data.session.user.id!==ADMIN_UID){
    document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:20px;background:#08080f;font-family:Orbitron,monospace;"><div style="font-size:14px;color:#f04060;">🔒 ACCÈS REFUSÉ</div><a href="index.html" style="font-size:10px;color:#a040f0;padding:12px 24px;border:1.5px solid #a040f0;border-radius:6px;text-decoration:none;">🏠 ACCUEIL</a></div>';
    return;
  }
  document.getElementById('nav-user').textContent='👤 '+data.session.user.email;
  await loadMessages();
})();
</script>
</body>
</html>

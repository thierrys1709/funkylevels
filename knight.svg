<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 45" width="22" height="45">
  <!-- Boots -->
  <rect x="2" y="36" width="8" height="9" fill="#2d3748"/>
  <rect x="12" y="36" width="8" height="9" fill="#2d3748"/>
  <rect x="1" y="39" width="10" height="6" fill="#4a5568"/>
  <rect x="11" y="39" width="10" height="6" fill="#4a5568"/>
  <!-- Legs armor -->
  <rect x="3" y="28" width="7" height="10" fill="#718096"/>
  <rect x="12" y="28" width="7" height="10" fill="#718096"/>
  <!-- Body armor (chest plate) -->
  <rect x="1" y="14" width="20" height="15" fill="#4a5568"/>
  <rect x="2" y="13" width="18" height="15" fill="#718096"/>
  <!-- Chest detail -->
  <rect x="6" y="15" width="10" height="10" fill="#4a5568"/>
  <rect x="7" y="16" width="8" height="8" fill="#63b3ed" opacity="0.3"/>
  <!-- Cross on chest -->
  <rect x="10" y="16" width="2" height="8" fill="#a0aec0"/>
  <rect x="7" y="19" width="8" height="2" fill="#a0aec0"/>
  <!-- Shoulder pads -->
  <rect x="-1" y="13" width="5" height="7" rx="2" fill="#4a5568"/>
  <rect x="18" y="13" width="5" height="7" rx="2" fill="#4a5568"/>
  <!-- Arms -->
  <rect x="0" y="18" width="3" height="10" fill="#718096"/>
  <rect x="19" y="18" width="3" height="10" fill="#718096"/>
  <!-- Shield -->
  <rect x="-3" y="15" width="5" height="10" rx="1" fill="#c53030"/>
  <rect x="-2" y="16" width="3" height="8" rx="1" fill="#fc8181"/>
  <rect x="-1" y="19" width="1" height="3" fill="#c53030"/>
  <!-- Helmet -->
  <rect x="2" y="1" width="18" height="13" fill="#4a5568"/>
  <rect x="3" y="2" width="16" height="12" fill="#718096"/>
  <!-- Visor -->
  <rect x="3" y="6" width="16" height="5" fill="#1a202c"/>
  <rect x="4" y="7" width="14" height="3" fill="#2d3748"/>
  <!-- Eye slits -->
  <rect x="5" y="7" width="4" height="2" fill="#63b3ed" opacity="0.8"/>
  <rect x="13" y="7" width="4" height="2" fill="#63b3ed" opacity="0.8"/>
  <!-- Helmet plume -->
  <rect x="9" y="0" width="4" height="3" fill="#c53030"/>
  <rect x="10" y="0" width="2" height="2" fill="#fc8181"/>
  <!-- Sword -->
  <rect x="21" y="5" width="2" height="25" fill="#a0aec0"/>
  <rect x="19" y="15" width="6" height="2" fill="#718096"/>
  <rect x="21" y="3" width="2" height="4" fill="#f6e05e"/>
</svg>

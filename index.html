<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FunkyLevels</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#08080f;--panel:#0f0f1e;--panel2:#12122a;--border:#1e1e35;--accent:#f0e040;--accent2:#a040f0;--green:#40f090;--red:#f04060;--blue:#4090f0;--text:#dddddd;--muted:#666688;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:'Press Start 2P',monospace;min-height:100vh;color:var(--text);font-size:14px;}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:32px 32px;opacity:.35;pointer-events:none;}

/* ── NAVBAR ── */
nav{position:sticky;top:0;z-index:100;background:#0a0a16ee;backdrop-filter:blur(10px);border-bottom:2px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:64px;}
.nav-logo{font-size:16px;color:var(--accent);text-shadow:0 0 15px var(--accent);text-decoration:none;letter-spacing:1px;}
.nav-right{display:flex;align-items:center;gap:14px;}
.nav-btn{font-family:'Press Start 2P',monospace;font-size:9px;padding:10px 16px;border-radius:3px;cursor:pointer;transition:all .15s;text-decoration:none;border:1.5px solid var(--border);background:transparent;color:var(--muted);}
.nav-btn:hover{border-color:var(--accent);color:var(--accent);}
.nav-btn.primary{background:var(--accent);color:#111;border-color:var(--accent);}
.nav-btn.primary:hover{background:#fff;}
.nav-btn.secondary{border-color:var(--accent2);color:var(--accent2);}
.nav-btn.secondary:hover{background:#a040f015;}
.lang-btn{font-family:'Press Start 2P',monospace;font-size:8px;padding:7px 10px;border:1.5px solid var(--border);border-radius:3px;background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;}
.lang-btn.active{border-color:var(--accent);color:var(--accent);background:#f0e04012;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
.user-chip{font-size:9px;color:var(--accent2);padding:8px 12px;border:1.5px solid var(--accent2);border-radius:3px;cursor:pointer;text-decoration:none;}
.user-chip:hover{background:#a040f015;}

/* ── HERO ── */
.hero{text-align:center;padding:64px 24px 48px;}
.hero h1{font-size:clamp(18px,5vw,36px);color:var(--accent);text-shadow:0 0 30px var(--accent);line-height:1.7;margin-bottom:20px;animation:pulse 2.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{text-shadow:0 0 20px var(--accent)}50%{text-shadow:0 0 40px var(--accent),0 0 80px var(--accent)}}
.hero p{font-size:11px;color:var(--muted);line-height:2.5;max-width:560px;margin:0 auto 32px;}
.hero-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
.hero-btn{font-family:'Press Start 2P',monospace;font-size:11px;padding:16px 24px;border-radius:3px;cursor:pointer;transition:all .15s;text-decoration:none;border:2px solid;}
.hero-btn.a{background:var(--accent);color:#111;border-color:var(--accent);}
.hero-btn.a:hover{background:#fff;transform:translateY(-2px);box-shadow:0 6px 25px #f0e04055;}
.hero-btn.b{background:transparent;color:var(--accent2);border-color:var(--accent2);}
.hero-btn.b:hover{background:#a040f015;transform:translateY(-2px);}

/* ── STATS ── */
.stats{display:flex;justify-content:center;max-width:640px;margin:0 auto 48px;border:2px solid var(--border);border-radius:4px;overflow:hidden;}
.stat{flex:1;padding:20px 8px;text-align:center;border-right:2px solid var(--border);background:var(--panel);}
.stat:last-child{border-right:none;}
.stat-val{font-size:22px;color:var(--accent);margin-bottom:10px;}
.stat-lbl{font-size:8px;color:var(--muted);letter-spacing:1px;}

/* ── SEARCH ── */
.search-wrap{max-width:860px;margin:0 auto 36px;padding:0 24px;display:flex;gap:12px;}
.search-wrap input{flex:1;background:var(--panel);border:1.5px solid var(--border);border-radius:3px;color:var(--text);font-family:'Press Start 2P',monospace;font-size:10px;padding:14px 16px;outline:none;transition:border-color .2s;}
.search-wrap input:focus{border-color:var(--accent2);}
.search-wrap input::placeholder{color:var(--muted);}
.search-wrap button{font-family:'Press Start 2P',monospace;font-size:9px;padding:14px 18px;background:var(--accent2);border:none;border-radius:3px;color:#fff;cursor:pointer;transition:all .15s;}
.search-wrap button:hover{background:#b060ff;}

/* ── TABS ── */
.stabs{display:flex;max-width:860px;margin:0 auto 24px;padding:0 24px;border-bottom:2px solid var(--border);}
.stab{font-family:'Press Start 2P',monospace;font-size:9px;padding:14px 18px;background:transparent;border:none;color:var(--muted);cursor:pointer;transition:all .2s;border-bottom:2px solid transparent;margin-bottom:-2px;}
.stab:hover{color:var(--text);}
.stab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ── GRID ── */
.levels-grid{max-width:860px;margin:0 auto;padding:0 24px 80px;display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px;}

/* ── CARD ── */
.level-card{background:var(--panel);border:1.5px solid var(--border);border-radius:5px;overflow:hidden;cursor:pointer;transition:all .2s;position:relative;}
.level-card:hover{border-color:var(--accent2);transform:translateY(-3px);box-shadow:0 8px 30px #a040f022;}
.level-thumb{height:110px;background:var(--panel2);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.level-thumb-bg{position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:16px 16px;opacity:.5;}
.level-thumb-icon{font-size:36px;position:relative;z-index:1;}
.level-body{padding:16px 14px;}
.level-title{font-size:10px;color:var(--text);margin-bottom:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.level-meta{display:flex;justify-content:space-between;align-items:center;}
.level-author{font-size:8px;color:var(--muted);}
.level-rating{font-size:10px;color:var(--accent);}
.level-plays{font-size:8px;color:var(--muted);margin-top:8px;}
.level-badge{position:absolute;top:8px;right:8px;font-size:7px;padding:4px 8px;border-radius:2px;background:var(--accent);color:#111;}

/* ── EMPTY / LOADING ── */
.empty{text-align:center;padding:60px 20px;color:var(--muted);grid-column:1/-1;}
.empty .icon{font-size:40px;margin-bottom:16px;}
.empty p{font-size:10px;line-height:2.5;margin-top:8px;}
.loading{text-align:center;padding:40px;font-size:10px;color:var(--muted);grid-column:1/-1;}

/* ── LEVEL MODAL ── */
#level-modal{display:none;position:fixed;inset:0;background:#000000bb;z-index:200;align-items:center;justify-content:center;}
#level-modal.show{display:flex;}
.lm-box{background:var(--panel);border:2px solid var(--border);border-radius:6px;padding:32px 28px;width:380px;display:flex;flex-direction:column;gap:18px;box-shadow:0 0 40px #000000cc;}
.lm-title{font-size:13px;color:var(--accent);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lm-meta{display:flex;justify-content:space-between;font-size:9px;color:var(--muted);}
.lm-btns{display:flex;gap:12px;margin-top:6px;}
.lm-btn{flex:1;font-family:'Press Start 2P',monospace;font-size:9px;padding:14px;border:none;border-radius:3px;cursor:pointer;transition:all .15s;}
.lm-btn.play{background:var(--green);color:#111;}
.lm-btn.play:hover{background:#80ffb0;}
.lm-btn.edit{background:var(--blue);color:#fff;}
.lm-btn.edit:hover{background:#60b0ff;}
.lm-btn.cancel{background:#1a1a2a;color:#888;border:1.5px solid #333;}
.lm-btn.cancel:hover{color:#ccc;}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--panel);border:1.5px solid var(--green);color:var(--green);font-size:9px;padding:14px 22px;border-radius:4px;z-index:999;transition:transform .3s;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="bg-grid"></div>

<nav>
  <a href="index.html" class="nav-logo">⚡ FUNKYLEVELS</a>
  <div class="nav-right">
    <div style="display:flex;gap:6px;">
      <button class="lang-btn active" id="btn-fr" onclick="setLang('fr')">🇫🇷 FR</button>
      <button class="lang-btn" id="btn-en" onclick="setLang('en')">🇬🇧 EN</button>
    </div>
    <a href="settings.html" class="user-chip" id="nav-user" style="display:none;">👤 ...</a>
    <a href="studio.html" class="nav-btn" id="nav-create">✏️ CRÉER</a>
    <a href="login.html" class="nav-btn primary" id="nav-login">CONNEXION</a>
    <button class="nav-btn" id="nav-logout" style="display:none;" onclick="doLogout()">DÉCO</button>
  </div>
</nav>

<div class="hero">
  <h1 id="hero-title">⚡ FUNKYLEVELS</h1>
  <p id="hero-sub">Crée des niveaux de platformer fous,<br>partage-les et joue à ceux des autres !</p>
  <div class="hero-btns">
    <a href="studio.html" class="hero-btn a" id="hero-btn-create">✏️ CRÉER UN NIVEAU</a>
    <a href="#levels" class="hero-btn b" id="hero-btn-browse">🎮 PARCOURIR</a>
  </div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-val" id="stat-levels">-</div><div class="stat-lbl" id="stat-levels-lbl">NIVEAUX</div></div>
  <div class="stat"><div class="stat-val" id="stat-plays">-</div><div class="stat-lbl" id="stat-plays-lbl">PARTIES</div></div>
  <div class="stat"><div class="stat-val" id="stat-ratings">-</div><div class="stat-lbl" id="stat-ratings-lbl">NOTES</div></div>
</div>

<div class="search-wrap">
  <input type="text" id="search-input" placeholder="🔍 Rechercher un niveau..." oninput="onSearch()">
  <button onclick="onSearch()" id="search-btn">CHERCHER</button>
</div>

<div class="stabs" id="anchor-levels">
  <button class="stab active" id="stab-new" onclick="switchSection('new')">🆕 <span id="stab-new-txt">NOUVEAUX</span></button>
  <button class="stab" id="stab-top" onclick="switchSection('top')">🏆 <span id="stab-top-txt">MEILLEURS</span></button>
  <button class="stab" id="stab-mine" onclick="switchSection('mine')">👤 <span id="stab-mine-txt">MES NIVEAUX</span></button>
</div>

<div class="levels-grid" id="levels-grid">
  <div class="loading" id="loading-msg">Chargement...</div>
</div>

<!-- LEVEL MODAL -->
<div id="level-modal">
  <div class="lm-box">
    <div class="lm-title" id="modal-title"></div>
    <div class="lm-meta"><span id="modal-author"></span><span id="modal-rating"></span></div>
    <div class="lm-meta"><span id="modal-plays"></span></div>
    <div class="lm-btns">
      <button class="lm-btn cancel" onclick="closeLevelModal()">✕</button>
      <button class="lm-btn edit" id="modal-edit-btn" onclick="doEditLevel()" style="display:none;">✏️ <span id="modal-edit-txt">ÉDITER</span></button>
      <button class="lm-btn play" onclick="doPlayLevel()">▶ <span id="modal-play-txt">JOUER</span></button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL='https://cpmbkwrnchfutmrcmbfn.supabase.co';
const SUPABASE_KEY='sb_publishable_b9n_ZalBB9XAShFiK3HL3A_SOeSJ2ca';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const T={
  fr:{
    heroTitle:'⚡ FUNKYLEVELS',heroSub:'Crée des niveaux de platformer fous,\npartage-les et joue à ceux des autres !',
    btnCreate:'✏️ CRÉER UN NIVEAU',btnBrowse:'🎮 PARCOURIR',
    statLevels:'NIVEAUX',statPlays:'PARTIES',statRatings:'NOTES',
    searchPh:'🔍 Rechercher un niveau...',searchBtn:'CHERCHER',
    stabNew:'NOUVEAUX',stabTop:'MEILLEURS',stabMine:'MES NIVEAUX',
    navCreate:'✏️ CRÉER',navLogin:'CONNEXION',navLogout:'DÉCO',
    loading:'Chargement...',
    emptyNew:'Aucun niveau pour le moment.\nSois le premier à en créer un !',
    emptyTop:'Aucun niveau noté pour le moment.',
    emptyMine:'Tu n\'as pas encore créé de niveau.',
    emptySearch:'Aucun résultat.',
    notLogged:'Connecte-toi pour voir tes niveaux.',
    plays:'parties',noRating:'non noté',new:'NOUVEAU',
    edit:'ÉDITER',play:'JOUER',logoutOk:'Déconnecté !'
  },
  en:{
    heroTitle:'⚡ FUNKYLEVELS',heroSub:'Create crazy platformer levels,\nshare them and play others\'!',
    btnCreate:'✏️ CREATE A LEVEL',btnBrowse:'🎮 BROWSE',
    statLevels:'LEVELS',statPlays:'GAMES',statRatings:'RATINGS',
    searchPh:'🔍 Search a level...',searchBtn:'SEARCH',
    stabNew:'NEW',stabTop:'TOP RATED',stabMine:'MY LEVELS',
    navCreate:'✏️ CREATE',navLogin:'LOGIN',navLogout:'LOGOUT',
    loading:'Loading...',
    emptyNew:'No levels yet.\nBe the first to create one!',
    emptyTop:'No rated levels yet.',
    emptyMine:'You haven\'t created any level yet.',
    emptySearch:'No results.',
    notLogged:'Log in to see your levels.',
    plays:'plays',noRating:'not rated',new:'NEW',
    edit:'EDIT',play:'PLAY',logoutOk:'Logged out!'
  }
};

let lang=localStorage.getItem('fl_lang')||'fr';
let currentSection='new';
let currentUser=null;
let searchTimer=null;
let _modalLevel=null;

function setLang(l){
  lang=l;localStorage.setItem('fl_lang',l);
  document.getElementById('btn-fr').classList.toggle('active',l==='fr');
  document.getElementById('btn-en').classList.toggle('active',l==='en');
  const t=T[l];
  document.getElementById('hero-title').textContent=t.heroTitle;
  document.getElementById('hero-sub').innerHTML=t.heroSub.replace('\n','<br>');
  document.getElementById('hero-btn-create').textContent=t.btnCreate;
  document.getElementById('hero-btn-browse').textContent=t.btnBrowse;
  document.getElementById('stat-levels-lbl').textContent=t.statLevels;
  document.getElementById('stat-plays-lbl').textContent=t.statPlays;
  document.getElementById('stat-ratings-lbl').textContent=t.statRatings;
  document.getElementById('search-input').placeholder=t.searchPh;
  document.getElementById('search-btn').textContent=t.searchBtn;
  document.getElementById('stab-new-txt').textContent=t.stabNew;
  document.getElementById('stab-top-txt').textContent=t.stabTop;
  document.getElementById('stab-mine-txt').textContent=t.stabMine;
  document.getElementById('nav-create').textContent=t.navCreate;
  document.getElementById('nav-login').textContent=t.navLogin;
  document.getElementById('nav-logout').textContent=t.navLogout;
  document.getElementById('modal-edit-txt').textContent=t.edit;
  document.getElementById('modal-play-txt').textContent=t.play;
  loadSection(currentSection);
}

async function checkAuth(){
  const{data}=await sb.auth.getSession();
  if(data.session){
    currentUser=data.session.user;
    const username=currentUser.user_metadata?.username||currentUser.email.split('@')[0];
    document.getElementById('nav-user').textContent='👤 '+username;
    document.getElementById('nav-user').style.display='';
    document.getElementById('nav-login').style.display='none';
    document.getElementById('nav-logout').style.display='';
    // Load profile lang
    const{data:profile}=await sb.from('profiles').select('lang').eq('id',currentUser.id).single();
    if(profile?.lang&&profile.lang!==lang){
      lang=profile.lang;
      localStorage.setItem('fl_lang',lang);
      setLang(lang);
    }
  }
}

async function doLogout(){
  await sb.auth.signOut();
  showToast(T[lang].logoutOk);
  setTimeout(()=>location.reload(),800);
}

async function loadStats(){
  const{count:lc}=await sb.from('levels').select('*',{count:'exact',head:true});
  const{data:plays}=await sb.from('levels').select('plays');
  const totalPlays=plays?.reduce((a,b)=>a+(b.plays||0),0)||0;
  const{count:rc}=await sb.from('ratings').select('*',{count:'exact',head:true});
  document.getElementById('stat-levels').textContent=lc||0;
  document.getElementById('stat-plays').textContent=totalPlays;
  document.getElementById('stat-ratings').textContent=rc||0;
}

function switchSection(s){
  currentSection=s;
  document.querySelectorAll('.stab').forEach(t=>t.classList.remove('active'));
  document.getElementById('stab-'+s).classList.add('active');
  loadSection(s);
}

async function loadSection(s){
  const grid=document.getElementById('levels-grid');
  const t=T[lang];
  grid.innerHTML=`<div class="loading">${t.loading}</div>`;
  const q=document.getElementById('search-input').value.trim();
  let levels=[];

  if(s==='new'){
    let query=sb.from('levels').select('*').order('created_at',{ascending:false}).limit(24);
    if(q)query=query.ilike('title','%'+q+'%');
    const{data}=await query;levels=data||[];
  }else if(s==='top'){
    let query=sb.from('levels').select('*').order('plays',{ascending:false}).limit(24);
    if(q)query=query.ilike('title','%'+q+'%');
    const{data}=await query;levels=data||[];
  }else if(s==='mine'){
    if(!currentUser){grid.innerHTML=`<div class="empty"><div class="icon">🔒</div><p>${t.notLogged}</p></div>`;return;}
    const{data}=await sb.from('levels').select('*').eq('user_id',currentUser.id).order('created_at',{ascending:false});
    levels=data||[];
  }

  if(!levels.length){
    const msg=q?t.emptySearch:s==='new'?t.emptyNew:s==='top'?t.emptyTop:t.emptyMine;
    grid.innerHTML=`<div class="empty"><div class="icon">${s==='mine'?'🎮':'🌟'}</div><p>${msg.replace('\n','<br>')}</p></div>`;
    return;
  }
  grid.innerHTML=levels.map(l=>levelCard(l)).join('');
}

function levelCard(l){
  const t=T[lang];
  const age=(Date.now()-new Date(l.created_at).getTime())/1000/3600;
  const isNew=age<48;
  const icons=['🌟','🎮','🔥','⚡','🌈','🎯','💫','🏆','🧩','🚀'];
  const icon=icons[Math.abs((l.id||'').charCodeAt(0)||0)%icons.length];
  const rating=l.rating?'⭐ '+Number(l.rating).toFixed(1):t.noRating;
  return`<div class="level-card" onclick="openLevelModal('${l.id}')">
    ${isNew?`<div class="level-badge">${t.new}</div>`:''}
    <div class="level-thumb"><div class="level-thumb-bg"></div><div class="level-thumb-icon">${icon}</div></div>
    <div class="level-body">
      <div class="level-title">${esc(l.title||'Sans titre')}</div>
      <div class="level-meta">
        <span class="level-author">@${esc(l.author||'anonyme')}</span>
        <span class="level-rating">${rating}</span>
      </div>
      <div class="level-plays">▶ ${l.plays||0} ${t.plays}</div>
    </div>
  </div>`;
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

async function openLevelModal(id){
  const{data,error}=await sb.from('levels').select('*').eq('id',id).single();
  if(error||!data)return;
  _modalLevel=data;
  const t=T[lang];
  const isOwner=currentUser&&currentUser.id===data.user_id;
  document.getElementById('modal-title').textContent=data.title||'Sans titre';
  document.getElementById('modal-author').textContent='@'+(data.author||'anonyme');
  document.getElementById('modal-plays').textContent=(data.plays||0)+' '+t.plays;
  document.getElementById('modal-rating').textContent=data.rating?'⭐ '+Number(data.rating).toFixed(1):t.noRating;
  document.getElementById('modal-edit-btn').style.display=isOwner?'':'none';
  document.getElementById('level-modal').classList.add('show');
}
function closeLevelModal(){document.getElementById('level-modal').classList.remove('show');}
function doPlayLevel(){if(!_modalLevel)return;window.location.href=`studio.html?level=${_modalLevel.id}&mode=play`;}
function doEditLevel(){if(!_modalLevel)return;window.location.href=`studio.html?level=${_modalLevel.id}&mode=edit`;}

document.getElementById('level-modal').addEventListener('click',e=>{if(e.target===document.getElementById('level-modal'))closeLevelModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLevelModal();});

function onSearch(){clearTimeout(searchTimer);searchTimer=setTimeout(()=>loadSection(currentSection),350);}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// Init
setLang(lang);
checkAuth();
loadStats();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FunkyLevels</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#08080f;--panel:#0f0f1e;--panel2:#12122a;--border:#1e1e40;--border2:#2a2a55;--text:#e8e8ff;--muted:#6060aa;--accent:#f0e040;--accent2:#a040f0;--red:#f04060;--green:#40f090;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:Rajdhani,sans-serif;min-height:100vh;}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:#06060ecc;backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;gap:12px;}
.nav-logo{font-family:Orbitron,monospace;font-size:14px;font-weight:900;color:var(--accent);letter-spacing:2px;text-decoration:none;margin-right:auto;}
.nav-btn{font-family:'Press Start 2P',monospace;font-size:9px;padding:10px 16px;border-radius:3px;cursor:pointer;transition:all .15s;text-decoration:none;border:1.5px solid var(--border);background:transparent;color:var(--muted);}
.nav-btn:hover{border-color:var(--accent2);color:var(--text);}
.nav-btn.primary{border-color:var(--accent2);color:var(--accent2);}
.user-chip{display:flex;align-items:center;gap:6px;font-family:Rajdhani,sans-serif;font-size:13px;font-weight:700;color:var(--text);text-decoration:none;padding:6px 12px;border:1.5px solid var(--border);border-radius:20px;}
.lang-bar{display:flex;gap:4px;}
.lang-btn{font-family:'Press Start 2P',monospace;font-size:10px;padding:6px 10px;border:1.5px solid var(--border);border-radius:3px;background:var(--panel);color:var(--muted);cursor:pointer;}
.lang-btn.active{border-color:var(--accent);color:var(--accent);}

/* HERO */
.hero{text-align:center;padding:60px 24px 40px;position:relative;}
.hero h1{font-family:Orbitron,monospace;font-size:clamp(24px,5vw,48px);font-weight:900;color:var(--accent);letter-spacing:4px;margin-bottom:16px;}
.hero p{font-family:Rajdhani,sans-serif;font-size:15px;color:var(--muted);margin-bottom:32px;line-height:1.6;}
.hero-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.hero-btn{font-family:'Press Start 2P',monospace;font-size:10px;padding:14px 24px;border-radius:4px;cursor:pointer;text-decoration:none;transition:all .15s;}
.hero-btn.a{background:var(--accent2);color:#fff;border:none;}
.hero-btn.a:hover{background:#7050d0;}
.hero-btn.b{background:transparent;color:var(--accent2);border:2px solid var(--accent2);}
.hero-btn.b:hover{background:#a040f022;}

/* STATS */
.stats-bar{display:flex;justify-content:center;gap:0;max-width:500px;margin:0 auto 40px;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;}
.stat{flex:1;padding:20px;text-align:center;border-right:1px solid var(--border);}
.stat:last-child{border-right:none;}
.stat-val{font-family:Orbitron,monospace;font-size:22px;font-weight:900;color:var(--accent);}
.stat-lbl{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--muted);margin-top:6px;}

/* SEARCH */
.search-wrap{max-width:600px;margin:0 auto 24px;display:flex;gap:8px;padding:0 24px;}
.search-input{flex:1;background:var(--panel);border:1.5px solid var(--border);border-radius:4px;color:var(--text);font-family:Rajdhani,sans-serif;font-size:14px;padding:12px 16px;outline:none;}
.search-input:focus{border-color:var(--accent2);}
.search-btn{font-family:'Press Start 2P',monospace;font-size:9px;padding:12px 16px;background:var(--accent2);color:#fff;border:none;border-radius:4px;cursor:pointer;}

/* TABS */
.section-tabs{display:flex;gap:0;max-width:900px;margin:0 auto 24px;padding:0 24px;border-bottom:2px solid var(--border);}
.stab{font-family:'Press Start 2P',monospace;font-size:8px;padding:12px 20px;background:transparent;border:none;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;display:flex;align-items:center;gap:8px;}
.stab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* GRID */
.levels-wrap{max-width:900px;margin:0 auto;padding:0 24px 60px;}
.levels-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;}
.level-card{background:var(--panel);border:1.5px solid var(--border);border-radius:5px;overflow:hidden;cursor:pointer;transition:all .2s;position:relative;}
.level-card:hover{border-color:var(--accent2);transform:translateY(-3px);box-shadow:0 8px 30px #a040f022;}
.card-edit-btn{position:absolute;top:8px;right:8px;background:#1a1a3a;border:1.5px solid #4040aa;border-radius:6px;color:#90a0f0;font-size:14px;padding:5px 8px;cursor:pointer;opacity:0;transition:opacity .15s;z-index:2;}
.level-card:hover .card-edit-btn{opacity:1;}
.card-edit-btn:hover{background:#2a2a5a;border-color:#7060f0;}
.level-thumb{height:110px;background:var(--panel2);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.level-thumb-bg{position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 10px,#ffffff05 10px,#ffffff05 20px);}
.level-thumb-icon{font-size:36px;position:relative;z-index:1;}
.level-badge{position:absolute;top:8px;left:8px;font-family:'Press Start 2P',monospace;font-size:6px;padding:4px 8px;background:var(--accent);color:#000;border-radius:2px;}
.level-body{padding:12px;}
.level-title{font-family:Orbitron,monospace;font-size:10px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px;}
.level-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:6px;}
.level-author{font-size:11px;color:var(--muted);}
.level-plays{font-size:12px;color:var(--muted);}
.level-times{display:flex;gap:10px;font-family:Orbitron,monospace;font-size:9px;color:#a0a0cc;margin-top:4px;}
.empty{text-align:center;padding:60px 24px;color:var(--muted);}
.empty .icon{font-size:48px;margin-bottom:16px;}
.empty p{font-family:Rajdhani,sans-serif;font-size:14px;line-height:1.8;}
.loading{text-align:center;padding:60px;font-family:'Press Start 2P',monospace;font-size:10px;color:var(--muted);}
.vis-badge{font-family:'Press Start 2P',monospace;font-size:6px;padding:3px 7px;border-radius:3px;flex-shrink:0;}
.vis-badge.public{background:#0d2a1a;color:#40f090;border:1px solid #40f090;}
.vis-badge.code{background:#1a0d2a;color:#c090f0;border:1px solid #c090f0;}
.vis-badge.private{background:#2a0d14;color:#f04060;border:1px solid #f04060;}

/* TOAST */
#settings-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a3a;border:1.5px solid var(--accent2);border-radius:6px;padding:12px 24px;font-family:'Press Start 2P',monospace;font-size:9px;color:var(--text);opacity:0;transition:all .3s;z-index:999;pointer-events:none;}
#settings-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">⚡ FUNKYLEVELS</a>
  <div class="lang-bar">
    <button class="lang-btn" id="btn-fr" onclick="setLang('fr')">FR</button>
    <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
  </div>
  <a href="settings.html" class="user-chip" id="nav-user" style="display:none;">👤</a>
  <a href="studio.html" class="nav-btn" id="nav-create" style="display:none;">✏️ CRÉER</a>
  <a href="login.html" class="nav-btn primary" id="nav-login">CONNEXION</a>
  <button class="nav-btn" id="nav-logout" style="display:none;" onclick="doLogout()">DÉCO</button>
</nav>

<div class="hero">
  <h1 id="hero-title">⚡ FUNKYLEVELS</h1>
  <p id="hero-sub">Crée des niveaux de platformer fous,<br>partage-les et joue à ceux des autres !</p>
  <div class="hero-btns">
    <a href="studio.html" class="hero-btn a" id="hero-btn-create" style="display:none;">✏️ CRÉER UN NIVEAU</a>
    <a href="#levels" class="hero-btn b" id="hero-btn-browse">🎮 PARCOURIR</a>
  </div>
</div>

<div class="stats-bar">
  <div class="stat"><div class="stat-val" id="stat-levels">-</div><div class="stat-lbl" id="stat-levels-lbl">NIVEAUX</div></div>
  <div class="stat"><div class="stat-val" id="stat-plays">-</div><div class="stat-lbl" id="stat-plays-lbl">PARTIES</div></div>
</div>

<div class="search-wrap">
  <input type="text" class="search-input" id="search-input" placeholder="🔍 Rechercher un niveau..." onkeydown="if(event.key==='Enter')doSearch()">
  <button class="search-btn" id="search-btn" onclick="doSearch()">CHERCHER</button>
</div>

<div id="levels" class="section-tabs">
  <button class="stab active" id="stab-new" onclick="switchSection('new')"><span>🆕</span><span id="stab-new-txt">NOUVEAUX</span></button>
  <button class="stab" id="stab-top" onclick="switchSection('top')"><span>🏆</span><span id="stab-top-txt">MEILLEURS</span></button>
  <button class="stab" id="stab-mine" onclick="switchSection('mine')"><span>👤</span><span id="stab-mine-txt">MES NIVEAUX</span></button>
</div>

<div class="levels-wrap">
  <div class="levels-grid" id="levels-grid"><div class="loading">Chargement...</div></div>
</div>

<div id="settings-toast"></div>

<script>
const SUPABASE_URL='https://cpmbkwrnchfutmrcmbfn.supabase.co';
const SUPABASE_KEY='sb_publishable_b9n_ZalBB9XAShFiK3HL3A_SOeSJ2ca';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{realtime:{enabled:false}});

const T={
  fr:{
    heroTitle:'⚡ FUNKYLEVELS',heroSub:'Crée des niveaux de platformer fous,\npartage-les et joue à ceux des autres !',
    btnCreate:'✏️ CRÉER UN NIVEAU',btnBrowse:'🎮 PARCOURIR',
    statLevels:'NIVEAUX',statPlays:'PARTIES',
    searchPh:'🔍 Rechercher un niveau...',searchBtn:'CHERCHER',
    stabNew:'NOUVEAUX',stabTop:'MEILLEURS',stabMine:'MES NIVEAUX',
    navCreate:'✏️ CRÉER',navLogin:'CONNEXION',navLogout:'DÉCO',
    loading:'Chargement...',
    emptyNew:'Aucun niveau pour le moment.\nSois le premier à en créer un !',
    emptyTop:'Aucun niveau pour le moment.',
    emptyMine:'Tu n\'as pas encore créé de niveau.',
    emptySearch:'Aucun résultat.',
    notLogged:'Connecte-toi pour voir tes niveaux.',
    plays:'parties',noRating:'non noté',new:'NOUVEAU',
    edit:'ÉDITER',play:'JOUER',logoutOk:'Déconnecté !'
  },
  en:{
    heroTitle:'⚡ FUNKYLEVELS',heroSub:'Create crazy platformer levels,\nshare them and play others\'!',
    btnCreate:'✏️ CREATE A LEVEL',btnBrowse:'🎮 BROWSE',
    statLevels:'LEVELS',statPlays:'GAMES',
    searchPh:'🔍 Search a level...',searchBtn:'SEARCH',
    stabNew:'NEW',stabTop:'TOP',stabMine:'MY LEVELS',
    navCreate:'✏️ CREATE',navLogin:'LOGIN',navLogout:'LOGOUT',
    loading:'Loading...',
    emptyNew:'No levels yet.\nBe the first to create one!',
    emptyTop:'No levels yet.',
    emptyMine:'You haven\'t created any level yet.',
    emptySearch:'No results.',
    notLogged:'Log in to see your levels.',
    plays:'plays',noRating:'not rated',new:'NEW',
    edit:'EDIT',play:'PLAY',logoutOk:'Logged out!'
  }
};

let _rawLang=localStorage.getItem('fl_lang')||'fr';
let lang=(_rawLang==='fr'||_rawLang==='en')?_rawLang:'fr';
let currentSection='new';
let currentUser=null;

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtMs(ms){if(!ms&&ms!==0)return'—';return(ms/1000).toFixed(2)+'s';}

function showToast(msg){
  const t=document.getElementById('settings-toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function setLang(l){
  if(l!=='fr'&&l!=='en')l='fr';
  lang=l;localStorage.setItem('fl_lang',l);
  document.getElementById('btn-fr').classList.toggle('active',l==='fr');
  document.getElementById('btn-en').classList.toggle('active',l==='en');
  const t=T[l];
  document.getElementById('hero-title').textContent=t.heroTitle;
  document.getElementById('hero-sub').innerHTML=t.heroSub.replace('\n','<br>');
  const hbc=document.getElementById('hero-btn-create');
  if(hbc){const d=hbc.style.display;hbc.textContent=t.btnCreate;hbc.style.display=d;}
  document.getElementById('hero-btn-browse').textContent=t.btnBrowse;
  document.getElementById('stat-levels-lbl').textContent=t.statLevels;
  document.getElementById('stat-plays-lbl').textContent=t.statPlays;
  document.getElementById('search-input').placeholder=t.searchPh;
  document.getElementById('search-btn').textContent=t.searchBtn;
  document.getElementById('stab-new-txt').textContent=t.stabNew;
  document.getElementById('stab-top-txt').textContent=t.stabTop;
  document.getElementById('stab-mine-txt').textContent=t.stabMine;
  const nc=document.getElementById('nav-create');
  if(nc){const d=nc.style.display;nc.textContent=t.navCreate;nc.style.display=d;}
  document.getElementById('nav-login').textContent=t.navLogin;
  document.getElementById('nav-logout').textContent=t.navLogout;
  loadSection(currentSection);
}

function applySession(user){
  if(!user)return;
  currentUser=user;
  const username=user.user_metadata?.username||user.email.split('@')[0];
  document.getElementById('nav-user').textContent='👤 '+username;
  document.getElementById('nav-user').style.display='';
  document.getElementById('nav-login').style.display='none';
  document.getElementById('nav-logout').style.display='';
  document.getElementById('nav-create').style.display='';
  const hbc=document.getElementById('hero-btn-create');
  if(hbc)hbc.style.display='';
}

async function checkAuth(){
  const{data}=await sb.auth.getSession();
  if(data.session){
    applySession(data.session.user);
    const{data:profile}=await sb.from('profiles').select('lang').eq('id',data.session.user.id).single();
    if(profile?.lang&&(profile.lang==='fr'||profile.lang==='en')&&profile.lang!==lang){
      lang=profile.lang;localStorage.setItem('fl_lang',lang);setLang(lang);
    }
  }
}

// Get auth token from localStorage without calling sb.auth
function getToken(){
  try{
    const key=Object.keys(localStorage).find(k=>k.includes('auth-token'));
    if(!key)return null;
    const obj=JSON.parse(localStorage.getItem(key));
    return obj?.access_token||obj?.currentSession?.access_token||null;
  }catch(e){return null;}
}

// Direct fetch helper (avoids Supabase JS client hanging)
async function sbFetch(path,token){
  const headers={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+(token||SUPABASE_KEY)};
  const r=await fetch(SUPABASE_URL+'/rest/v1/'+path,{headers});
  return r.ok?r.json():[];
}

async function loadStats(){
  const data=await sbFetch('levels?select=plays&visibility=eq.public');
  const count=Array.isArray(data)?data.length:0;
  const plays=Array.isArray(data)?data.reduce((a,b)=>a+(b.plays||0),0):0;
  document.getElementById('stat-levels').textContent=count;
  document.getElementById('stat-plays').textContent=plays;
}

function switchSection(s){
  currentSection=s;
  document.querySelectorAll('.stab').forEach(t=>t.classList.remove('active'));
  document.getElementById('stab-'+s).classList.add('active');
  loadSection(s);
}

function doSearch(){loadSection(currentSection);}

async function loadSection(s){
  const grid=document.getElementById('levels-grid');
  const t=T[lang]||T['fr'];
  grid.innerHTML=`<div class="loading">${t.loading}</div>`;
  const q=document.getElementById('search-input').value.trim();
  let levels=[];

  if(s==='new'){
    let url='levels?select=id,title,plays,completions,created_at,visibility,user_id&visibility=eq.public&order=created_at.desc&limit=24';
    if(q)url+='&title=ilike.*'+encodeURIComponent(q)+'*';
    levels=await sbFetch(url);
  }else if(s==='top'){
    let url='levels?select=id,title,plays,completions,created_at,visibility,user_id&visibility=eq.public&order=plays.desc&limit=24';
    if(q)url+='&title=ilike.*'+encodeURIComponent(q)+'*';
    levels=await sbFetch(url);
  }else if(s==='mine'){
    if(!currentUser){grid.innerHTML=`<div class="empty"><div class="icon">🔒</div><p>${t.notLogged}</p></div>`;return;}
    // Get token from localStorage directly without using sb.auth
    const token=getToken();
    let url='levels?select=id,title,plays,completions,created_at,visibility,user_id&user_id=eq.'+currentUser.id+'&order=created_at.desc';
    if(q)url+='&title=ilike.*'+encodeURIComponent(q)+'*';
    levels=await sbFetch(url,token);
  }

  if(!Array.isArray(levels)||!levels.length){
    const msg=q?t.emptySearch:s==='new'?t.emptyNew:s==='top'?t.emptyTop:t.emptyMine;
    grid.innerHTML=`<div class="empty"><div class="icon">${s==='mine'?'🎮':'🌟'}</div><p>${msg.replace('\n','<br>')}</p></div>`;
    return;
  }

  grid.innerHTML=levels.map(l=>levelCard(l)).join('');

  // Fetch leaderboard times
  const ids=levels.map(l=>l.id);
  const records=await sbFetch('leaderboard?select=level_id,time_ms&level_id=in.('+ids.join(',')+')'+'&order=time_ms.asc');
  const worldBests={};
  if(Array.isArray(records))records.forEach(r=>{if(!worldBests[r.level_id])worldBests[r.level_id]=r.time_ms;});

  let myBests={};
  if(currentUser){
    const mine=await sbFetch('leaderboard?select=level_id,time_ms&level_id=in.('+ids.join(',')+')'+'&user_id=eq.'+currentUser.id+'&order=time_ms.asc',getToken());
    if(Array.isArray(mine))mine.forEach(r=>{if(!myBests[r.level_id])myBests[r.level_id]=r.time_ms;});
  }

  levels.forEach(l=>{
    const card=document.querySelector(`.level-card[data-id="${l.id}"]`);
    if(!card)return;
    const el=card.querySelector('.level-times');
    if(el){
      let html='';
      if(worldBests[l.id])html+=`<span title="Record mondial">🏆 ${fmtMs(worldBests[l.id])}</span>`;
      if(myBests[l.id])html+=`<span title="Mon record">⭐ ${fmtMs(myBests[l.id])}</span>`;
      el.innerHTML=html;
    }
  });
}

function levelCard(l){
  const t=T[lang]||T['fr'];
  const age=(Date.now()-new Date(l.created_at).getTime())/1000/3600;
  const isNew=age<48;
  const icons=['🌟','🎮','🔥','⚡','🌈','🎯','💫','🏆','🧩','🚀'];
  const icon=icons[Math.abs((l.id||'').charCodeAt(0)||0)%icons.length];
  const isOwner=currentUser&&currentUser.id===l.user_id;
  return`<div class="level-card" data-id="${l.id}" onclick="window.location.href='game.html?level=${l.id}'" style="position:relative;">
    ${isNew?`<div class="level-badge">${t.new}</div>`:''}
    ${isOwner?`<button class="card-edit-btn" onclick="event.stopPropagation();window.location.href='studio.html?level=${l.id}&mode=edit'" title="${lang==='fr'?'Éditer':'Edit'}">✏️</button>`:''}
    <div class="level-thumb"><div class="level-thumb-bg"></div><div class="level-thumb-icon">${icon}</div></div>
    <div class="level-body">
      <div class="level-title">${esc(l.title||'Sans titre')}</div>
      <div class="level-meta">
        <span class="level-author">@${esc(l.username||'anonyme')}</span>
        <span class="vis-badge vis-${l.visibility||'private'}">${l.visibility==='public'?(lang==='fr'?'Public':'Public'):l.visibility==='code'?(lang==='fr'?'Invitation':'Invite'):(lang==='fr'?'Privé':'Private')}</span>
      </div>
      <div class="level-plays">▶ ${l.plays||0} ${t.plays}</div>
      <div class="level-times"></div>
    </div>
  </div>`;
}

function doLogout(){
  Object.keys(localStorage).forEach(k=>{
    if(k.startsWith('sb-')||k.includes('supabase'))localStorage.removeItem(k);
  });
  currentUser=null;
  showToast((T[lang]||T['fr']).logoutOk);
  setTimeout(()=>window.location.href='index.html',600);
}

// Init
setLang(lang);
loadStats();

sb.auth.onAuthStateChange(async(event,session)=>{
  if(session){
    applySession(session.user);
    const{data:profile}=await sb.from('profiles').select('lang').eq('id',session.user.id).single();
    if(profile?.lang&&(profile.lang==='fr'||profile.lang==='en')&&profile.lang!==lang){
      lang=profile.lang;localStorage.setItem('fl_lang',lang);setLang(lang);
    }
    if(event==='SIGNED_IN')loadSection(currentSection);
  }else{
    currentUser=null;
  }
});

(async()=>{await checkAuth();})();
</script>
</body>
</html>

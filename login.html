<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FunkyLevels — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--bg:#08080f;--panel:#0f0f1e;--border:#1e1e35;--accent:#f0e040;--accent2:#a040f0;--green:#40f090;--red:#f04060;--text:#cccccc;--muted:#444466;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);font-family:'Press Start 2P',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;color:var(--text);}
  .bg-grid{position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:32px 32px;opacity:.5;pointer-events:none;}
  .pixel{position:fixed;border-radius:1px;opacity:0;animation:floatPixel linear infinite;}
  @keyframes floatPixel{0%{opacity:0;transform:translateY(100vh) rotate(0)}10%{opacity:.6}90%{opacity:.3}100%{opacity:0;transform:translateY(-100px) rotate(360deg)}}
  .lang-switch{position:fixed;top:16px;right:16px;z-index:100;display:flex;gap:6px;}
  .lang-btn{font-family:'Press Start 2P',monospace;font-size:10px;padding:6px 10px;border:1.5px solid var(--border);border-radius:3px;background:var(--panel);color:var(--muted);cursor:pointer;transition:all .15s;}
  .lang-btn:hover{border-color:var(--accent);color:var(--accent);}
  .lang-btn.active{border-color:var(--accent);color:var(--accent);background:#f0e04015;}
  .container{position:relative;z-index:10;width:100%;max-width:420px;padding:20px;animation:fadeIn .6s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .logo{text-align:center;margin-bottom:32px;}
  .logo h1{font-size:20px;color:var(--accent);text-shadow:0 0 20px var(--accent),0 0 40px var(--accent);letter-spacing:2px;animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{text-shadow:0 0 20px var(--accent),0 0 40px var(--accent)}50%{text-shadow:0 0 30px var(--accent),0 0 60px var(--accent),0 0 80px var(--accent)}}
  .logo p{font-size:9px;color:var(--muted);margin-top:10px;letter-spacing:3px;}
  .card{background:var(--panel);border:2px solid var(--border);border-radius:6px;overflow:hidden;box-shadow:0 0 40px #00000099,0 0 80px #a040f011;}
  .tabs{display:flex;border-bottom:2px solid var(--border);}
  .tab{flex:1;padding:16px;font-family:'Press Start 2P',monospace;font-size:10px;background:transparent;border:none;color:var(--muted);cursor:pointer;transition:all .2s;}
  .tab:hover{color:var(--text);background:#ffffff08;}
  .tab.active{color:var(--accent);background:#f0e04010;border-bottom:2px solid var(--accent);margin-bottom:-2px;}
  .form{padding:28px 24px;display:none;flex-direction:column;gap:18px;}
  .form.active{display:flex;}
  .field{display:flex;flex-direction:column;gap:8px;}
  .field label{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
  .field input{background:#0a0a18;border:1.5px solid var(--border);border-radius:3px;color:var(--text);font-family:'Press Start 2P',monospace;font-size:11px;padding:12px 14px;outline:none;transition:border-color .2s;width:100%;}
  .field input:focus{border-color:var(--accent2);}
  .field input::placeholder{color:#333355;}
  .forgot-link{text-align:right;}
  .forgot-link button{font-family:'Press Start 2P',monospace;font-size:8px;background:none;border:none;color:var(--muted);cursor:pointer;padding:2px 0;transition:color .2s;}
  .forgot-link button:hover{color:var(--accent2);}
  .btn-main{font-family:'Press Start 2P',monospace;font-size:11px;padding:14px;border:none;border-radius:3px;cursor:pointer;background:var(--accent);color:#111;transition:all .15s;letter-spacing:1px;margin-top:4px;}
  .btn-main:hover{background:#fff;transform:translateY(-1px);box-shadow:0 4px 20px #f0e04055;}
  .btn-main:active{transform:translateY(0);}
  .btn-main:disabled{opacity:.5;cursor:not-allowed;transform:none;}
  .btn-google{font-family:'Press Start 2P',monospace;font-size:10px;padding:12px;border:1.5px solid var(--border);border-radius:3px;cursor:pointer;background:transparent;color:var(--text);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:10px;}
  .btn-google:hover{border-color:#4285f4;color:#4285f4;background:#4285f410;}
  .sep{display:flex;align-items:center;gap:12px;font-size:9px;color:var(--muted);}
  .sep::before,.sep::after{content:'';flex:1;height:1px;background:var(--border);}
  .msg{font-size:10px;padding:10px 12px;border-radius:3px;display:none;line-height:2.2;text-align:center;}
  .msg.error{background:#f0406020;border:1px solid var(--red);color:var(--red);display:block;}
  .msg.success{background:#40f09020;border:1px solid var(--green);color:var(--green);display:block;}
  .back-link{text-align:center;margin-top:20px;font-size:9px;color:var(--muted);}
  .back-link a{color:var(--accent2);text-decoration:none;transition:color .2s;}
  .back-link a:hover{color:var(--accent);}
  .spinner{display:inline-block;width:10px;height:10px;border:2px solid #11111166;border-top-color:#111;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:8px;}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Reset modal */
  #reset-modal{display:none;position:fixed;inset:0;background:#000000bb;z-index:300;align-items:center;justify-content:center;}
  #reset-modal.show{display:flex;}
  .reset-box{background:var(--panel);border:2px solid var(--border);border-radius:6px;padding:28px 24px;width:340px;display:flex;flex-direction:column;gap:16px;box-shadow:0 0 40px #000000cc;}
  .reset-box h3{font-size:8px;color:var(--accent2);text-align:center;}
  .reset-box p{font-size:6px;color:var(--muted);line-height:2.2;text-align:center;}
  .reset-row{display:flex;gap:10px;}
  .reset-btn{flex:1;font-family:'Press Start 2P',monospace;font-size:10px;padding:11px;border:none;border-radius:3px;cursor:pointer;transition:all .15s;}
  .reset-btn.ok{background:var(--accent2);color:#fff;}
  .reset-btn.ok:hover{background:#b060ff;}
  .reset-btn.ok:disabled{opacity:.5;cursor:not-allowed;}
  .reset-btn.cancel{background:#1a1a2a;color:#888;border:1.5px solid #333;}
  .reset-btn.cancel:hover{color:#ccc;}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="lang-switch">
  <button class="lang-btn active" id="btn-fr" onclick="setLang('fr')">🇫🇷 FR</button>
  <button class="lang-btn" id="btn-en" onclick="setLang('en')">🇬🇧 EN</button>
</div>
<script>
const colors=['#f0e040','#a040f0','#40f090','#4090f0','#f04060'];
for(let i=0;i<20;i++){const p=document.createElement('div');p.className='pixel';p.style.left=Math.random()*100+'vw';p.style.background=colors[Math.floor(Math.random()*colors.length)];p.style.animationDuration=(8+Math.random()*12)+'s';p.style.animationDelay=(Math.random()*10)+'s';p.style.width=p.style.height=(4+Math.random()*6)+'px';document.body.appendChild(p);}
</script>

<div class="container">
  <div class="logo">
    <h1>⚡ FUNKYLEVELS</h1>
    <p id="logo-sub">CRÉE · PARTAGE · JOUE</p>
  </div>
  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">CONNEXION</button>
      <button class="tab" id="tab-signup" onclick="switchTab('signup')">INSCRIPTION</button>
    </div>
    <!-- LOGIN -->
    <div class="form active" id="form-login">
      <div id="msg-login" class="msg"></div>
      <div class="field"><label id="lbl-login-email">Email</label><input type="email" id="login-email" placeholder="ton@email.com" autocomplete="email"></div>
      <div class="field">
        <label id="lbl-login-pass">Mot de passe</label>
        <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
      </div>
      <div class="forgot-link"><button onclick="openReset()" id="forgot-btn">Mot de passe oublié ?</button></div>
      <button class="btn-main" id="btn-login" onclick="doLogin()">JOUER →</button>
      <div class="sep" id="sep-login">OU</div>
      <button class="btn-google" onclick="doGoogle()">
        <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        <span id="google-login-txt">CONTINUER AVEC GOOGLE</span>
      </button>
    </div>
    <!-- SIGNUP -->
    <div class="form" id="form-signup">
      <div id="msg-signup" class="msg"></div>
      <div class="field"><label id="lbl-signup-pseudo">Pseudo</label><input type="text" id="signup-pseudo" placeholder="MonPseudo" maxlength="20" autocomplete="username"></div>
      <div class="field"><label id="lbl-signup-email">Email</label><input type="email" id="signup-email" placeholder="ton@email.com" autocomplete="email"></div>
      <div class="field"><label id="lbl-signup-pass">Mot de passe</label><input type="password" id="signup-pass" placeholder="8 caractères minimum" autocomplete="new-password"></div>
      <button class="btn-main" id="btn-signup" onclick="doSignup()">CRÉER MON COMPTE →</button>
      <div class="sep" id="sep-signup">OU</div>
      <button class="btn-google" onclick="doGoogle()">
        <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        <span id="google-signup-txt">CONTINUER AVEC GOOGLE</span>
      </button>
    </div>
  </div>
  <div class="back-link"><a href="studio.html" id="back-link-txt">← RETOUR AU JEU</a></div>
</div>

<!-- RESET MODAL -->
<div id="reset-modal">
  <div class="reset-box">
    <h3 id="reset-title">🔑 MOT DE PASSE OUBLIÉ</h3>
    <p id="reset-desc">Entre ton email et on t'envoie un lien pour réinitialiser ton mot de passe.</p>
    <div id="reset-msg" class="msg"></div>
    <div class="field"><label id="reset-email-lbl">EMAIL</label><input type="email" id="reset-email" placeholder="ton@email.com" autocomplete="email" style="margin-top:8px;"></div>
    <div class="reset-row">
      <button class="reset-btn cancel" onclick="closeReset()" id="reset-cancel-btn">ANNULER</button>
      <button class="reset-btn ok" onclick="doReset()" id="reset-ok-btn">ENVOYER →</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://cpmbkwrnchfutmrcmbfn.supabase.co';
const SUPABASE_KEY='sb_publishable_b9n_ZalBB9XAShFiK3HL3A_SOeSJ2ca';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const T={
  fr:{
    logoSub:'CRÉE · PARTAGE · JOUE',
    tabLogin:'CONNEXION',tabSignup:'INSCRIPTION',
    lblLoginEmail:'Email',lblLoginPass:'Mot de passe',
    lblPseudo:'Pseudo',lblSignupEmail:'Email',lblSignupPass:'Mot de passe',
    btnLogin:'JOUER →',btnSignup:'CRÉER MON COMPTE →',
    google:'CONTINUER AVEC GOOGLE',or:'OU',back:'← RETOUR AU JEU',
    phEmail:'ton@email.com',phPass:'••••••••',phPseudo:'MonPseudo',phPassNew:'8 caractères minimum',
    errFields:'Remplis tous les champs !',errLen:'Mot de passe trop court (8 min).',
    errCreds:'Email ou mot de passe incorrect.',
    okLogin:'Connexion réussie ! Redirection...',okSignup:'Compte créé ! Vérifie ta boîte mail.',
    forgot:'Mot de passe oublié ?',
    resetTitle:'🔑 MOT DE PASSE OUBLIÉ',
    resetDesc:"Entre ton email et on t'envoie un lien pour réinitialiser ton mot de passe.",
    resetLbl:'EMAIL',resetCancel:'ANNULER',resetOk:'ENVOYER →',
    resetSending:'ENVOI...',resetSuccess:'Email envoyé ! Vérifie ta boîte mail.',
    resetErrEmpty:'Entre ton email !'
  },
  en:{
    logoSub:'CREATE · SHARE · PLAY',
    tabLogin:'LOGIN',tabSignup:'SIGN UP',
    lblLoginEmail:'Email',lblLoginPass:'Password',
    lblPseudo:'Username',lblSignupEmail:'Email',lblSignupPass:'Password',
    btnLogin:'PLAY →',btnSignup:'CREATE ACCOUNT →',
    google:'CONTINUE WITH GOOGLE',or:'OR',back:'← BACK TO GAME',
    phEmail:'your@email.com',phPass:'••••••••',phPseudo:'MyUsername',phPassNew:'8 characters minimum',
    errFields:'Please fill in all fields!',errLen:'Password too short (8 min).',
    errCreds:'Invalid email or password.',
    okLogin:'Logged in! Redirecting...',okSignup:'Account created! Check your email.',
    forgot:'Forgot password?',
    resetTitle:'🔑 FORGOT PASSWORD',
    resetDesc:"Enter your email and we'll send you a link to reset your password.",
    resetLbl:'EMAIL',resetCancel:'CANCEL',resetOk:'SEND →',
    resetSending:'SENDING...',resetSuccess:'Email sent! Check your inbox.',
    resetErrEmpty:'Enter your email!'
  }
};

let lang=localStorage.getItem('fl_lang')||'fr';

function setLang(l){
  lang=l;localStorage.setItem('fl_lang',l);
  document.getElementById('btn-fr').classList.toggle('active',l==='fr');
  document.getElementById('btn-en').classList.toggle('active',l==='en');
  const t=T[l];
  document.getElementById('logo-sub').textContent=t.logoSub;
  document.getElementById('tab-login').textContent=t.tabLogin;
  document.getElementById('tab-signup').textContent=t.tabSignup;
  document.getElementById('lbl-login-email').textContent=t.lblLoginEmail;
  document.getElementById('lbl-login-pass').textContent=t.lblLoginPass;
  document.getElementById('lbl-signup-pseudo').textContent=t.lblPseudo;
  document.getElementById('lbl-signup-email').textContent=t.lblSignupEmail;
  document.getElementById('lbl-signup-pass').textContent=t.lblSignupPass;
  document.getElementById('btn-login').textContent=t.btnLogin;
  document.getElementById('btn-signup').textContent=t.btnSignup;
  document.getElementById('google-login-txt').textContent=t.google;
  document.getElementById('google-signup-txt').textContent=t.google;
  document.getElementById('sep-login').textContent=t.or;
  document.getElementById('sep-signup').textContent=t.or;
  document.getElementById('back-link-txt').textContent=t.back;
  document.getElementById('login-email').placeholder=t.phEmail;
  document.getElementById('login-pass').placeholder=t.phPass;
  document.getElementById('signup-pseudo').placeholder=t.phPseudo;
  document.getElementById('signup-email').placeholder=t.phEmail;
  document.getElementById('signup-pass').placeholder=t.phPassNew;
  document.getElementById('forgot-btn').textContent=t.forgot;
  document.getElementById('reset-title').textContent=t.resetTitle;
  document.getElementById('reset-desc').textContent=t.resetDesc;
  document.getElementById('reset-email-lbl').textContent=t.resetLbl;
  document.getElementById('reset-cancel-btn').textContent=t.resetCancel;
  document.getElementById('reset-ok-btn').textContent=t.resetOk;
}
setLang(lang);

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.form').forEach(f=>f.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('form-'+tab).classList.add('active');
}

function showMsg(id,type,text){const el=document.getElementById(id);el.className='msg '+type;el.textContent=text;}
function clearMsg(id){document.getElementById(id).className='msg';}

function setLoading(btnId,loading){
  const btn=document.getElementById(btnId);const t=T[lang];
  if(loading){btn.disabled=true;btn.innerHTML='<span class="spinner"></span>'+(lang==='fr'?'CHARGEMENT...':'LOADING...');}
  else{btn.disabled=false;btn.textContent=btnId==='btn-login'?t.btnLogin:t.btnSignup;}
}

async function doLogin(){
  clearMsg('msg-login');const t=T[lang];
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  if(!email||!pass){showMsg('msg-login','error',t.errFields);return;}
  setLoading('btn-login',true);
  const{error}=await sb.auth.signInWithPassword({email,password:pass});
  setLoading('btn-login',false);
  if(error){showMsg('msg-login','error',error.message.includes('Invalid')?t.errCreds:error.message);}
  else{showMsg('msg-login','success',t.okLogin);setTimeout(()=>window.location.href='index.html',1200);}
}

async function checkUsernameAvailable(pseudo){
  if(!pseudo||pseudo.length<3)return false;
  const{data}=await sb.from('profiles').select('id').eq('username',pseudo).maybeSingle();
  return !data; // true = available
}

async function doSignup(){
  clearMsg('msg-signup');const t=T[lang];
  const pseudo=document.getElementById('signup-pseudo').value.trim();
  const email=document.getElementById('signup-email').value.trim();
  const pass=document.getElementById('signup-pass').value;
  if(!pseudo||!email||!pass){showMsg('msg-signup','error',t.errFields);return;}
  if(pseudo.length<3){showMsg('msg-signup','error','Le pseudo doit avoir au moins 3 caractères.');return;}
  if(pass.length<8){showMsg('msg-signup','error',t.errLen);return;}
  // Check username availability
  const available=await checkUsernameAvailable(pseudo);
  if(!available){showMsg('msg-signup','error','Ce pseudo est déjà pris !');return;}
  setLoading('btn-signup',true);
  const{data,error}=await sb.auth.signUp({email,password:pass,options:{data:{username:pseudo}}});
  if(error){setLoading('btn-signup',false);showMsg('msg-signup','error',error.message);return;}
  // Save username to profiles (trigger creates profile, we update username)
  if(data?.user){
    await sb.from('profiles').upsert({id:data.user.id,username:pseudo},{onConflict:'id'});
  }
  setLoading('btn-signup',false);
  showMsg('msg-signup','success',t.okSignup);
}

async function doGoogle(){
  const{error}=await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:window.location.origin+'/index.html'}});
  if(error)alert(error.message);
}

// ── Reset password ────────────────────────
function openReset(){
  document.getElementById('reset-msg').className='msg';
  document.getElementById('reset-email').value='';
  document.getElementById('reset-modal').classList.add('show');
  document.getElementById('reset-email').focus();
}
function closeReset(){document.getElementById('reset-modal').classList.remove('show');}

async function doReset(){
  const t=T[lang];
  const email=document.getElementById('reset-email').value.trim();
  const msgEl=document.getElementById('reset-msg');
  const btn=document.getElementById('reset-ok-btn');
  if(!email){msgEl.className='msg error';msgEl.textContent=t.resetErrEmpty;return;}
  btn.disabled=true;btn.textContent=t.resetSending;
  const{error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin+'/reset.html'});
  btn.disabled=false;btn.textContent=t.resetOk;
  if(error){msgEl.className='msg error';msgEl.textContent=error.message;}
  else{msgEl.className='msg success';msgEl.textContent=t.resetSuccess;setTimeout(()=>closeReset(),2500);}
}

document.getElementById('reset-modal').addEventListener('click',e=>{if(e.target===document.getElementById('reset-modal'))closeReset();});

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    if(document.getElementById('reset-modal').classList.contains('show')){doReset();return;}
    if(document.getElementById('form-login').classList.contains('active'))doLogin();
    else doSignup();
  }
  if(e.key==='Escape')closeReset();
});

sb.auth.getSession().then(({data})=>{if(data.session)window.location.href='index.html';});
</script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 45" width="22" height="45">
  <!-- Legs -->
  <rect x="3" y="35" width="7" height="10" fill="#1a202c"/>
  <rect x="12" y="35" width="7" height="10" fill="#1a202c"/>
  <!-- Body -->

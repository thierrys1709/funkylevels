<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 45" width="22" height="45">
  <!-- Ghost body (wavy bottom) -->
  <rect x="1" y="8" width="20" height="30" fill="#e2e8f0"/>
  <!-- Wavy bottom -->
  <rect x="1" y="35" width="5" height="8" fill="#e2e8f0"/>
  <rect x="9" y="35" width="5" height="8" fill="#e2e8f0"/>
  <rect x="17" y="35" width="5" height="8" fill="#e2e8f0"/>
  <!-- Rounded top (head) -->
  <ellipse cx="11" cy="10" rx="10" ry="10" fill="#e2e8f0"/>
  <!-- Eyes -->
  <ellipse cx="7" cy="14" rx="3" ry="4" fill="#1a202c"/>
  <ellipse cx="15" cy="14" rx="3" ry="4" fill="#1a202c"/>
  <!-- Eye shine -->
  <ellipse cx="6" cy="13" rx="1" ry="1.5" fill="#e2e8f0"/>
  <ellipse cx="14" cy="13" rx="1" ry="1.5" fill="#e2e8f0"/>
  <!-- Mouth (o shape) -->
  <ellipse cx="11" cy="23" rx="3" ry="3" fill="#a0aec0"/>
  <ellipse cx="11" cy="23" rx="2" ry="2" fill="#1a202c"/>
  <!-- Blush -->
  <ellipse cx="5" cy="20" rx="2" ry="1" fill="#feb2b2" opacity="0.6"/>
  <ellipse cx="17" cy="20" rx="2" ry="1" fill="#feb2b2" opacity="0.6"/>
  <!-- Arms (little stubby) -->
  <ellipse cx="1" cy="20" rx="2" ry="4" fill="#e2e8f0"/>
  <ellipse cx="21" cy="20" rx="2" ry="4" fill="#e2e8f0"/>
</svg>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FunkyLevels — Jouer</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#06060e; font-family:'Press Start 2P',monospace; display:flex; flex-direction:column; height:100vh; overflow:hidden; color:#ccc; }
#gwrap { display:none; position:fixed; inset:0; background:#06060e; z-index:90; flex-direction:column; align-items:center; justify-content:center; }
#gwrap.show { display: flex; }
#gwrap:fullscreen { background: #06060e; }

#gtopbar {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 10px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
  flex-shrink: 0;
}
#g-time {
  font-family: 'Orbitron', monospace;
  font-size: 14px;
  color: var(--accent);
}

#gcanvas { border: 2px solid var(--border2); border-radius: 6px; max-width: 100%; max-height: calc(100vh - 60px); }

/* ─── OVERLAYS ─── */
.ov { display:none; position:fixed; inset:0; align-items:center; justify-content:center; flex-direction:column; gap:20px; background:#000000cc; z-index:100; backdrop-filter:blur(4px); }
.ov.show { display: flex; }
.ov h2 { font-family:'Orbitron',monospace; font-size:22px; font-weight:900; letter-spacing:2px; }
.ov p { font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:600; color:var(--text2); text-align:center; line-height:2; }
.ov button {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  font-weight: 700;
  background: var(--accent);
  color: #111;
  border: none;
  padding: 12px 24px;
  cursor: pointer;
  border-radius: 4px;
  letter-spacing: 1px;
  transition: all .15s;
}
.ov button:hover { background: #fff; transform: translateY(-2px); }
#ovWin h2 { color: var(--green); text-shadow: 0 0 20px var(--green); }
#ovDie h2 { color: var(--red); text-shadow: 0 0 20px var(--red); }
#ovStart h2 { color: var(--accent); text-shadow: 0 0 20px var(--accent); }

/* ─── STATUS BAR ─── */
#statusbar {
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  line-height: 1.8;
  padding: 2px 4px;
  border-top: 1px solid var(--border);
  margin-top: 4px;
}

/* ─── PUBLISH MODAL ─── */
#publish-modal { display:none; position:fixed; inset:0; background:#000000bb; z-index:200; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
#publish-modal.show { display: flex; }
.pub-box {
  background: var(--bg2);
  border: 2px solid var(--border2);
  border-radius: 8px;
  padding: 28px 24px;
  width: 360px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  box-shadow: 0 0 60px #00000099, 0 0 30px #7060f022;
}
.pub-box h3 {
  font-family: 'Orbitron', monospace;
  font-size: 12px;
  font-weight: 700;
  color: var(--accent3);
  text-align: center;
  letter-spacing: 1px;
}
.pub-box label {
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--label);
  letter-spacing: 1px;
  text-transform: uppercase;
}
.pub-box input {
  background: var(--input-bg);
  border: 1.5px solid var(--border2);
  border-radius: 4px;
  color: var(--text);
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  padding: 10px 12px;
  outline: none;
  width: 100%;
  transition: border-color .2s;
  margin-top: 6px;
}
.pub-box input:focus { border-color: var(--accent2); }
.pub-row { display: flex; gap: 10px; }
.pub-btn {
  flex: 1;
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  font-weight: 700;
  padding: 12px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  transition: all .15s;
  letter-spacing: 0.5px;
}
.pub-btn.ok { background: var(--accent3); color: #111; }
.pub-btn.ok:hover { background: #80e8ff; transform: translateY(-1px); }
.pub-btn.ok:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.pub-btn.cancel { background: var(--bg3); color: var(--text2); border: 1.5px solid var(--border2); }
.pub-btn.cancel:hover { color: var(--text); }
.pub-msg { font-family:'Rajdhani',sans-serif; font-size:12px; font-weight:600; padding:10px 12px; border-radius:4px; display:none; line-height:1.8; text-align:center; }
.pub-msg.ok  { background: #40f09018; border:1px solid var(--green); color:var(--green); display:block; }
.pub-msg.err { background: #f0406018; border:1px solid var(--red);   color:var(--red);   display:block; }

/* ─── VIS BUTTONS ─── */
.pub-vis-btn {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 12px;
  padding: 8px 10px;
  border: 1.5px solid var(--border2);
  border-radius: 4px;
  cursor: pointer;
  background: var(--input-bg);
  color: var(--text2);
  transition: all .15s;
  flex: 1;
  letter-spacing: 0.5px;
}
.pub-vis-btn:hover { border-color: var(--accent2); color: var(--text); }
.pub-vis-btn.active { border-color: var(--accent2); color: var(--accent); background: var(--tool-active); }

/* ─── LOAD MODAL ─── */
#load-modal { display:none; position:fixed; inset:0; background:#000000bb; z-index:200; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
#load-modal.show { display: flex; }
.load-box {
  background: var(--bg2);
  border: 2px solid var(--border2);
  border-radius: 8px;
  padding: 24px;
  width: 400px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  gap: 14px;
  box-shadow: 0 0 60px #00000099;
}
.load-box h3 {
  font-family: 'Orbitron', monospace;
  font-size: 12px;
  font-weight: 700;
  color: #90a0f0;
  text-align: center;
  letter-spacing: 1px;
}
#load-list { overflow-y: auto; display: flex; flex-direction: column; gap: 8px; flex: 1; }
#load-list::-webkit-scrollbar { width: 4px; }
#load-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.load-item {
  background: var(--bg3);
  border: 1.5px solid var(--border);
  border-radius: 4px;
  padding: 12px 14px;
  cursor: pointer;
  transition: all .15s;
}
.load-item:hover { border-color: var(--accent2); background: var(--tool-hover); transform: translateX(2px); }
.load-item-title { font-family:'Orbitron',monospace; font-size:10px; font-weight:700; color:var(--text); margin-bottom:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.load-item-meta  { font-family:'Rajdhani',sans-serif; font-size:11px; color:var(--muted); }
.load-close {
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  font-weight: 700;
  padding: 10px;
  background: var(--bg3);
  border: 1.5px solid var(--border2);
  border-radius: 4px;
  color: var(--text2);
  cursor: pointer;
  transition: all .15s;
  flex-shrink: 0;
}
.load-close:hover { color: var(--text); border-color: var(--red); }

</style>
</head>
<body>

<div id="gwrap">
  <div id="gtopbar">
    <span>⏱ <span id="g-time">0.0</span>s</span>
    <button class="act-btn" style="font-size:11px;padding:6px 14px;background:#0d0d28;border:1.5px solid #4040aa;color:#90a0f0;border-radius:4px;" onclick="stopGame()">◀ ÉDITEUR</button>
    <button class="act-btn" style="font-size:11px;padding:6px 14px;background:#0d280d;border:1.5px solid #3a8a3a;color:#40f090;border-radius:4px;" onclick="testFromCamera()">📷 ICI</button>
    <button class="act-btn" style="font-size:11px;padding:6px 14px;background:#1a1a0d;border:1.5px solid #7a7a3a;color:#f0e040;border-radius:4px;" onclick="toggleFullscreen()" id="btn-fs">⛶ PLEIN ÉCRAN</button>
  </div>
  <canvas id="gcanvas" width="900" height="500"></canvas>
</div>
<div class="ov" id="ovDie"><h2>RATÉ</h2><p id="die-msg"></p><button onclick="gameRespawn()">RÉESSAYER</button><button onclick="stopGame()" style="background:#333;color:#aaa;margin-top:-8px;">ÉDITEUR</button></div>
<div class="ov" id="ovWin"><h2>ARRIVÉ !</h2><p id="win-msg"></p><button onclick="stopGame()">ÉDITEUR</button></div>

<script>
// ── Supabase ──────────────────────────────
const SUPABASE_URL='https://cpmbkwrnchfutmrcmbfn.supabase.co';
const SUPABASE_KEY='sb_publishable_b9n_ZalBB9XAShFiK3HL3A_SOeSJ2ca';
const _sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const _lang=()=>localStorage.getItem('fl_lang')||'fr';

// ── Lang helpers ──────────────────────────
let _langCache={};
async function loadLang(l){
  if(_langCache[l])return _langCache[l];
  try{const r=await fetch('lang/'+l+'.json');const data=await r.json();_langCache[l]=data;return data;}
  catch(e){if(l!=='fr')return loadLang('fr');return {};}
}

// ── Character sprite ──────────────────────
let _charSprite=null;
let _charId='default';
const CHAR_ICONS={default:'🧑',ninja:'🥷',robot:'🤖',alien:'👽',ghost:'👻',cat:'🐱',fire:'🔥',star:'⭐',skull:'💀',wizard:'🧙',knight:'⚔️',frog:'🐸'};

async function loadCharacterSprite(charId){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{_charSprite=img;resolve(img);};
    img.onerror=()=>{_charSprite=null;resolve(null);};
    img.src='characters/'+charId+'.svg?v='+Date.now();
  });
}

// ── Editor stubs (game.html has no editor canvas) ──
const EC={style:{pointerEvents:''}};
let EW=1800;

// ── Level state ───────────────────────────
let _currentLevelId=null;
let lv=null;

// ── Load level from URL ───────────────────
async function init(){
  // Load profile for character
  const{data:sess}=await _sb.auth.getSession();
  if(sess.session){
    const{data:profile}=await _sb.from('profiles').select('character,lang').eq('id',sess.session.user.id).single();
    if(profile){
      if(profile.character){_charId=profile.character;localStorage.setItem('fl_char',profile.character);}
      if(profile.lang){localStorage.setItem('fl_lang',profile.lang);}
    }
  }else{
    _charId=localStorage.getItem('fl_char')||'default';
  }
  await loadCharacterSprite(_charId);

  // Apply lang to overlays
  const l=_lang();
  const data=await loadLang(l);
  const t=data.studio||{};
  if(t.ovDie){const h=document.querySelector('#ovDie h2');if(h)h.textContent=t.ovDie;}
  if(t.ovDieBtn){const btns=document.querySelectorAll('#ovDie button');if(btns[0])btns[0].textContent=t.ovDieBtn;if(btns[1])btns[1].textContent=t.ovDieEdit||'◀';}
  if(t.ovWin){const h=document.querySelector('#ovWin h2');if(h)h.textContent=t.ovWin;}
  if(t.ovWinBtn){const b=document.querySelector('#ovWin button');if(b)b.textContent=t.ovWinBtn;}
  if(t.gEditor){document.querySelectorAll('#gtopbar button').forEach(btn=>{if((btn.getAttribute('onclick')||'').includes('stopGame'))btn.textContent=t.gEditor;});}
  if(t.gFullscreen){const b=document.getElementById('btn-fs');if(b)b.textContent=t.gFullscreen;}

  // Load level
  const params=new URLSearchParams(window.location.search);
  const lid=params.get('level');
  if(!lid){
    document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Orbitron,monospace;font-size:14px;color:#f04060;">Aucun niveau spécifié.</div>';
    return;
  }
  const{data:levelData,error}=await _sb.from('levels').select('*').eq('id',lid).single();
  if(error||!levelData){
    document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Orbitron,monospace;font-size:14px;color:#f04060;">Niveau introuvable.</div>';
    return;
  }
  _currentLevelId=lid;
  lv=levelData.data;
  if(!lv.fixed)lv.fixed=[];if(!lv.trap)lv.trap=[];if(!lv.slider)lv.slider=[];
  if(!lv.invis)lv.invis=[];if(!lv.bounce)lv.bounce=[];if(!lv.mobile)lv.mobile=[];
  if(!lv.push)lv.push=[];if(!lv.gravflip)lv.gravflip=[];if(!lv.speed)lv.speed=[];
  // Increment plays
  await _sb.from('levels').update({plays:(levelData.plays||0)+1}).eq('id',lid);
  // Start game
  startGameFrom(lv.start.x,lv.start.y);
}

function stopGame(){
  gRunning=false;gWon=false;
  // Go back to previous page or index
  const ref=document.referrer;
  if(ref)window.history.back();
  else window.location.href='index.html';
}

function gameRespawn(){
  document.getElementById('ovDie').classList.remove('show');
  gDeadPending=false;
  if(gLives<=0){stopGame();return;}
  initPlayer(gLv.start.x,gLv.start.y);
  gCamX=Math.max(0,gLv.start.x-GW()*0.32);
  gParts=[];gBullets=[];
}


// ═══════════════════════════════════════════════════════════════
//  JEU
// ═══════════════════════════════════════════════════════════════
const GC=document.getElementById('gcanvas');
const GX=GC.getContext('2d');
function GW(){return GC.width;}
function GH(){return GC.height;}

const GRAV=0.55,JSPD=12.5,SPD=4;
const PCOL={bg:'#0c0c1a',plat:'#4a5568',platT:'#718096',platS:'#a0aec0',flagA:'#68d391',flagB:'#fc8181',player:'#f6ad55',pDark:'#c05621'};

let gLv,gPlayer,gParts=[],gCamX=0,gCamY=0,gKeys={};
let gRafId=null;
function gLoopStart(){if(gRafId)cancelAnimationFrame(gRafId);gRafId=requestAnimationFrame(gLoop);}

function playLevel(){startGameFrom(lv.start.x,lv.start.y);}
function testFromCamera(){startGameFrom(Math.max(50,gCamX+GW()*0.3),lv.start.y);}

function toggleFullscreen(){const wrap=document.getElementById('gwrap');if(!document.fullscreenElement){wrap.requestFullscreen?.();document.getElementById('btn-fs').textContent='✕ QUITTER';}else{document.exitFullscreen?.();document.getElementById('btn-fs').textContent='⛶ PLEIN ÉCRAN';}}
document.addEventListener('fullscreenchange',()=>{resizeGameCanvas();if(!document.fullscreenElement)document.getElementById('btn-fs').textContent='⛶ PLEIN ÉCRAN';});

function resizeGameCanvas(){const wrap=document.getElementById('gwrap'),bar=document.getElementById('gtopbar');if(!wrap)return;const availW=wrap.clientWidth||window.innerWidth,availH=(wrap.clientHeight||window.innerHeight)-(bar?.offsetHeight||50)-20;let w=Math.min(availW-20,availH*(16/9)),h=w/(16/9);GC.width=Math.max(400,Math.round(w));GC.height=Math.max(250,Math.round(h));}
window.addEventListener('resize',resizeGameCanvas);

function startGameFrom(sx,sy){
  resizeGameCanvas();
  gLv=JSON.parse(JSON.stringify(lv));
  (gLv.trap||[]).forEach(t=>{t.state='idle';t.vy=0;t.y=t.oy;t._carryingPlayer=false;});
  (gLv.slider||[]).forEach(s=>{s.state='idle';s.x=s.ox;s.y=s.oy;s.traveled=0;s.waitTimer=0;});
  (gLv.mobile||[]).forEach(m=>{m.x=m.ox;m.y=m.oy;m.t=0;m.going=true;});
  (gLv.push||[]).forEach(p=>{p.x=p.ox;p.y=p.oy;p.vx=0;p.vy=0;});
  // Speed zones
  (gLv.speed||[]).forEach(z=>{
    const spd=z.spd??5;
    const fast=spd>5;
    const col=spd===5?'#40c04018':fast?'#4040f018':'#f0404018';
    const border=spd===5?'#40c04044':fast?'#4040f044':'#f0404044';
    GX.fillStyle=col;GX.fillRect(z.x,z.y,z.w,z.h);
    GX.fillStyle=border;
    GX.fillRect(z.x,z.y,z.w,2);GX.fillRect(z.x,z.y+z.h-2,z.w,2);
    GX.fillRect(z.x,z.y,2,z.h);GX.fillRect(z.x+z.w-2,z.y,2,z.h);
  });
  (gLv.gravflip||[]).forEach(z=>{if(z.dir===undefined){z.dir=(z.grav??-10)<0?'u':'d';z.strength=Math.abs(z.grav??10);}});
  if(!gLv.speed)gLv.speed=[];
  gParts=[];gBullets=[];gLives=3;gElapsed=0;gWon=false;gRunning=true;gDeadPending=false;
  gStartTime=performance.now();
  gCamX=Math.max(0,sx-GW()*0.32);
  gCamY=Math.max(0,Math.min(EH-GH(),(sy-36)-GH()*0.25));
  initPlayer(sx,sy);
  document.getElementById('gwrap').classList.add('show');
  gLoopStart();
}

function stopGame(){gRunning=false;gWon=false;document.getElementById('gwrap').classList.remove('show');document.getElementById('ovWin').classList.remove('show');document.getElementById('ovDie').classList.remove('show');EC.style.pointerEvents='';}

function initPlayer(x,y){
  gPlayer={x,y:y-36,w:22,h:32,vx:0,vy:0,onGround:false,facing:1,wF:0,wT:0,dead:false,dT:0,sq:1,
    gravDir:'d',
    angle:0,targetAngle:0};
}

function gameRespawn(){document.getElementById('ovDie').classList.remove('show');gDeadPending=false;if(gLives<=0){stopGame();return;}initPlayer(gLv.start.x,gLv.start.y);gCamX=Math.max(0,gLv.start.x-GW()*0.32);gParts=[];gBullets=[];}

let gBullets=[];
function spawnP(x,y,col,n=10){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=Math.random()*3+1;gParts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:1,decay:.032+Math.random()*.03,col,r:Math.random()*4+2});}}

function ov(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

function res(p){
  if(!ov(gPlayer,p))return false;
  const oL=(gPlayer.x+gPlayer.w)-p.x,oR=(p.x+p.w)-gPlayer.x;
  const oT=(gPlayer.y+gPlayer.h)-p.y,oB=(p.y+p.h)-gPlayer.y;
  const m=Math.min(oL,oR,oT,oB);
  const gd=gPlayer.gravDir;

  if(m===oT){
    if(gd==='d'){gPlayer.y=p.y-gPlayer.h;gPlayer.vy=0;gPlayer.onGround=true;gPlayer.sq=1.15;return true;}
    else if(gd==='u'){gPlayer.y=p.y-gPlayer.h;gPlayer.vy=0;}
    else{gPlayer.y=p.y-gPlayer.h;}
  }else if(m===oB){
    if(gd==='u'){gPlayer.y=p.y+p.h;gPlayer.vy=0;gPlayer.onGround=true;gPlayer.sq=1.15;return true;}
    else if(gd==='d'){gPlayer.y=p.y+p.h;gPlayer.vy=0;}
    else{gPlayer.y=p.y+p.h;}
  }else if(m===oL){
    if(gd==='r'){gPlayer.x=p.x-gPlayer.w;gPlayer.vx=0;gPlayer.onGround=true;gPlayer.sq=1.15;return true;}
    else if(gd==='l'){gPlayer.x=p.x-gPlayer.w;gPlayer.vx=0;}
    else{gPlayer.x=p.x-gPlayer.w;}
  }else if(m===oR){
    if(gd==='l'){gPlayer.x=p.x+p.w;gPlayer.vx=0;gPlayer.onGround=true;gPlayer.sq=1.15;return true;}
    else if(gd==='r'){gPlayer.x=p.x+p.w;gPlayer.vx=0;}
    else{gPlayer.x=p.x+p.w;}
  }
  return false;
}

function killPlayer(){if(gPlayer.dead)return;gPlayer.dead=true;gPlayer.dT=0;spawnP(gPlayer.x+11,gPlayer.y+16,PCOL.player,20);}

let gLives=3,gElapsed=0,gWon=false,gRunning=false,gDeadPending=false,gStartTime=0;

function gUpdate(now){
  if(!gRunning||gWon)return;
  gElapsed=(now-gStartTime)/1000;
  document.getElementById('g-time').textContent=gElapsed.toFixed(1);
  gParts=gParts.filter(p=>p.life>0);
  gParts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.life-=p.decay;});

  if(gPlayer.dead){
    gPlayer.dT++;
    if(gPlayer.dT>55&&!gDeadPending){gDeadPending=true;gRunning=false;setTimeout(()=>startGameFrom(gLv.start.x,gLv.start.y),0);}
    return;
  }

  let gpL=false,gpR=false,gpJ=false;
  try{const gp=navigator.getGamepads?navigator.getGamepads()[0]:null;if(gp){gpL=gp.axes[0]<-0.3||gp.buttons[14]?.pressed;gpR=gp.axes[0]>0.3||gp.buttons[15]?.pressed;gpJ=gp.buttons[0]?.pressed||gp.buttons[12]?.pressed;}}catch(e){}

  const left=gKeys['ArrowLeft']||gKeys['KeyA']||gpL;
  const right=gKeys['ArrowRight']||gKeys['KeyD']||gpR;
  const jump=gKeys['Space']||gKeys['ArrowUp']||gKeys['KeyW']||gpJ;

  // ── Detect active gravity zone ──────────────────────────────
  let activeDir='d',activeStr=GRAV;
  let inGravZone=false;
  const prevGravDir=gPlayer.gravDir;

  // Speed zones
  (gLv.speed||[]).forEach(z=>{
    const spd=z.spd??5;
    const fast=spd>5;
    const col=spd===5?'#40c04018':fast?'#4040f018':'#f0404018';
    const border=spd===5?'#40c04044':fast?'#4040f044':'#f0404044';
    GX.fillStyle=col;GX.fillRect(z.x,z.y,z.w,z.h);
    GX.fillStyle=border;
    GX.fillRect(z.x,z.y,z.w,2);GX.fillRect(z.x,z.y+z.h-2,z.w,2);
    GX.fillRect(z.x,z.y,2,z.h);GX.fillRect(z.x+z.w-2,z.y,2,z.h);
  });
  (gLv.gravflip||[]).forEach(z=>{
    const margin=4;
    const tz={x:z.x+margin,y:z.y+margin,w:z.w-margin*2,h:z.h-margin*2};
    if(tz.w>0&&tz.h>0&&ov(gPlayer,tz)){
      activeDir=z.dir??'u';
      activeStr=(z.strength??10)*GRAV/10;
      inGravZone=true;
    }
  });

  const gravDirChanged=prevGravDir!==activeDir;
  gPlayer.gravDir=activeDir;

  // Transition de gravité : vélocité conservée — le joueur est projeté librement

  // ── Detect speed zone ────────────────────────────────────
  let zoneSpd=SPD,zoneJspd=JSPD;
  (gLv.speed||[]).forEach(z=>{
    if(ov(gPlayer,z)){
      const mult=(z.spd??5)/5;
      zoneSpd=SPD*mult;
      zoneJspd=JSPD*mult;
    }
  });

  // ── Controls based on gravity direction ─────────────────────
  const gd=gPlayer.gravDir;
  const isHorizGrav=(gd==='l'||gd==='r');

  if(isHorizGrav){
    if(left)      {gPlayer.vy=(gd==='r')?-zoneSpd:zoneSpd; gPlayer.facing=1;}
    else if(right){gPlayer.vy=(gd==='r')?zoneSpd:-zoneSpd; gPlayer.facing=-1;}
    else          {gPlayer.vy*=0.75;}
    if(jump&&gPlayer.onGround){
      gPlayer.vx=(gd==='r')?-zoneJspd:zoneJspd;
      gPlayer.onGround=false;gPlayer.sq=0.6;
      spawnP(gPlayer.x+(gd==='r'?gPlayer.w:0),gPlayer.y+gPlayer.h/2,'#ffffff20',5);
    }
  }else{
    if(left)      {gPlayer.vx=-zoneSpd;gPlayer.facing=-1;}
    else if(right){gPlayer.vx=zoneSpd;gPlayer.facing=1;}
    else          {gPlayer.vx*=0.75;}
    if(jump&&gPlayer.onGround){
      gPlayer.vy=(gd==='d')?-zoneJspd:zoneJspd;
      gPlayer.onGround=false;gPlayer.sq=0.6;
      spawnP(gPlayer.x+11,gPlayer.y+(gd==='d'?32:0),'#ffffff20',5);
    }
  }

  const moveSpd=isHorizGrav?Math.abs(gPlayer.vy):Math.abs(gPlayer.vx);
  if(moveSpd>0.5&&gPlayer.onGround){gPlayer.wT++;if(gPlayer.wT>7){gPlayer.wF^=1;gPlayer.wT=0;}}
  else if(gPlayer.onGround)gPlayer.wF=0;
  gPlayer.sq+=(1-gPlayer.sq)*0.18;

  // ── Apply gravity ──────────────────────────────────────────
  if(gd==='d')      gPlayer.vy=Math.min(gPlayer.vy+activeStr,20);
  else if(gd==='u') gPlayer.vy=Math.max(gPlayer.vy-activeStr,-20);
  else if(gd==='r') gPlayer.vx=Math.min(gPlayer.vx+activeStr,20);
  else if(gd==='l') gPlayer.vx=Math.max(gPlayer.vx-activeStr,-20);

  // ── Rotation ───────────────────────────────────────────────
  const TARGET_ANGLES={d:0,u:180,r:270,l:90};
  gPlayer.targetAngle=TARGET_ANGLES[gd]||0;
  const angleDiff=((gPlayer.targetAngle-(gPlayer.angle||0))+540)%360-180;
  gPlayer.angle=(gPlayer.angle||0)+Math.sign(angleDiff)*Math.min(15,Math.abs(angleDiff));

  // ── Move ───────────────────────────────────────────────────
  gPlayer.x+=gPlayer.vx;
  gPlayer.y+=gPlayer.vy;
  gPlayer.x=Math.max(0,gPlayer.x);
  gPlayer.onGround=false;

  // ── Zone boundary : aucune limite — le joueur sort librement ──

  // ── Trap ───────────────────────────────────────────────────
  (gLv.trap||[]).forEach(t=>{
    if(t.state==='gone')return;
    const dist=Math.max(0,t.ox-(gPlayer.x+gPlayer.w),gPlayer.x-(t.ox+t.w),t.oy-(gPlayer.y+gPlayer.h),gPlayer.y-(t.oy+t.h));
    if(t.state==='idle'&&dist<=t.trigDist){t.state='predelay';t.preTimer=0;t.vy=0;}
    if(t.state==='predelay'){if(dist>t.trigDist){t.state='idle';t.preTimer=0;}else{t.preTimer=(t.preTimer||0)+1;if(t.preTimer>=(t.preDelay||0)*60)t.state='falling';}}
    if(t.state==='falling'){
      t.vy+=(t.fallSpeed||1)*0.6;t.y+=t.vy;
      if(t._carryingPlayer&&!ov(gPlayer,{x:t.x-2,y:t.y-gPlayer.h-2,w:t.w+4,h:gPlayer.h+4}))killPlayer();
      if(t._carryingPlayer&&gPlayer.y>gCamY+GH()-gPlayer.h)killPlayer();
      t._carryingPlayer=false;
      const maxY=t.partial?(t.oy+(t.partDist||80)):(EH+100);
      if(t.y>=maxY){t.y=maxY;t.vy=0;if(t.returns){t.state='waiting';t.waitTimer=0;}else{t.state=t.partial?'locked':'gone';}}
    }else if(t.state==='waiting'){t.waitTimer=(t.waitTimer||0)+1;if(t.waitTimer>=(t.riseDelay||2)*60){t.state='rising';t.vy=0;}}
    else if(t.state==='rising'){
      t.y-=4;const wasCarrying=ov(gPlayer,{x:t.x,y:t.y+4,w:t.w,h:t.h})&&gPlayer.y+gPlayer.h<=t.y+8;
      if(t.y<=t.oy){t.y=t.oy;t.vy=0;t.state='cooldown';if(wasCarrying||(gPlayer.onGround&&ov(gPlayer,t))){gPlayer.y=t.y-gPlayer.h;gPlayer.vy=0;gPlayer.onGround=true;}}
    }else if(t.state==='cooldown'){if(!t.loop){t.state='locked';}else{const d2=Math.max(0,t.ox-(gPlayer.x+gPlayer.w),gPlayer.x-(t.ox+t.w),t.oy-(gPlayer.y+gPlayer.h),gPlayer.y-(t.oy+t.h));if(d2>t.trigDist)t.state='idle';}}
    if(t.state==='gone')return;
    if(['falling','idle','predelay','waiting','cooldown','locked'].includes(t.state)){
      if(ov(gPlayer,t)){const oL=(gPlayer.x+gPlayer.w)-t.x,oR=(t.x+t.w)-gPlayer.x,oT=(gPlayer.y+gPlayer.h)-t.y,oB=(t.y+t.h)-gPlayer.y,m=Math.min(oL,oR,oT,oB);
        if(m===oT){gPlayer.y=t.y-gPlayer.h;gPlayer.vy=t.state==='falling'?t.vy:0;gPlayer.onGround=true;gPlayer.sq=1.1;if(t.state==='falling'){t._carryingPlayer=true;if(gPlayer.y>gCamY+GH()-gPlayer.h)killPlayer();}}
        else if(m===oB&&gPlayer.vy<0){gPlayer.y=t.y+t.h;gPlayer.vy=0;}
        else if(m===oL){gPlayer.x=t.x-gPlayer.w;}else if(m===oR){gPlayer.x=t.x+t.w;}}
    }else if(t.state==='rising'){
      if(ov(gPlayer,t)){const oL=(gPlayer.x+gPlayer.w)-t.x,oR=(t.x+t.w)-gPlayer.x,oT=(gPlayer.y+gPlayer.h)-t.y,oB=(t.y+t.h)-gPlayer.y;const playerOverlapH=gPlayer.x+gPlayer.w>t.x+4&&gPlayer.x<t.x+t.w-4;if(playerOverlapH&&oT>0&&oT<gPlayer.h+8){gPlayer.y=t.y-gPlayer.h;gPlayer.vy=Math.min(gPlayer.vy,-4);gPlayer.onGround=true;gPlayer.sq=1.1;}else{const m=Math.min(oL,oR,oT,oB);if(m===oT){gPlayer.y=t.y-gPlayer.h;gPlayer.vy=Math.min(gPlayer.vy,-4);gPlayer.onGround=true;gPlayer.sq=1.1;}else if(m===oB){gPlayer.y=t.y+t.h;gPlayer.vy=0;killPlayer();}else if(m===oL){gPlayer.x=t.x-gPlayer.w;}else if(m===oR){gPlayer.x=t.x+t.w;}}}
    }
  });

  // ── Fixed & invis ─────────────────────────────────────────
  gLv.fixed.forEach(p=>res(p));
  (gLv.invis||[]).forEach(p=>res(p));

  // ── Mobile ────────────────────────────────────────────────
  const MO_VEC={r:[1,0],l:[-1,0],u:[0,-1],d:[0,1]};
  (gLv.mobile||[]).forEach(t=>{
    const[dx,dy]=MO_VEC[t.dir||'r'],spd=t.speed||2,prevX=t.x,prevY=t.y;
    if(t.going){t.x+=dx*spd;t.y+=dy*spd;t.t=(t.t||0)+spd;if(t.t>=(t.dist||160)){t.t=t.dist||160;t.x=t.ox+dx*t.t;t.y=t.oy+dy*t.t;t.going=false;}}
    else{t.x-=dx*spd;t.y-=dy*spd;t.t=(t.t||0)-spd;if(t.t<=0){t.t=0;t.x=t.ox;t.y=t.oy;t.going=true;}}
    if(ov(gPlayer,t)){
      const curGd=gPlayer.gravDir;
      if(curGd==='d'){const oT=(gPlayer.y+gPlayer.h)-t.y;if(oT>0&&oT<20&&gPlayer.vy>=0){gPlayer.x+=t.x-prevX;gPlayer.y=t.y-gPlayer.h;gPlayer.vy=0;gPlayer.onGround=true;}else{res(t);}}
      else if(curGd==='u'){const oB=(t.y+t.h)-gPlayer.y;if(oB>0&&oB<20&&gPlayer.vy<=0){gPlayer.x+=t.x-prevX;gPlayer.y=t.y+t.h;gPlayer.vy=0;gPlayer.onGround=true;}else{res(t);}}
      else if(curGd==='r'){const oL=(gPlayer.x+gPlayer.w)-t.x;if(oL>0&&oL<20&&gPlayer.vx>=0){gPlayer.y+=t.y-prevY;gPlayer.x=t.x-gPlayer.w;gPlayer.vx=0;gPlayer.onGround=true;}else{res(t);}}
      else if(curGd==='l'){const oR=(t.x+t.w)-gPlayer.x;if(oR>0&&oR<20&&gPlayer.vx<=0){gPlayer.y+=t.y-prevY;gPlayer.x=t.x+t.w;gPlayer.vx=0;gPlayer.onGround=true;}else{res(t);}}
    }
  });

  // ── Push ─────────────────────────────────────────────────
  (gLv.push||[]).forEach(t=>{
    t.vy=(t.vy||0)+GRAV;t.vy=Math.min(t.vy,20);t.vx=(t.vx||0)*t.fric;t.x+=t.vx;t.y+=t.vy;
    // Collide against ALL solid block types
    const solidBlocks=[
      ...gLv.fixed,
      ...(gLv.invis||[]),
      ...(gLv.slider||[]).filter(s=>s.state!=='done'),
      ...(gLv.mobile||[]),
      ...(gLv.trap||[]).filter(tr=>tr.state!=='gone'),
      ...(gLv.bounce||[]),
    ];
    solidBlocks.forEach(f=>{
      if(!ov(t,f))return;
      const oT=(t.y+t.h)-f.y,oB=(f.y+f.h)-t.y,oL=(t.x+t.w)-f.x,oR=(f.x+f.w)-t.x,m=Math.min(oT,oB,oL,oR);
      if(m===oT&&t.vy>=0){t.y=f.y-t.h;t.vy=0;}
      else if(m===oB&&t.vy<0){t.y=f.y+f.h;t.vy=0;}
      else if(m===oL){t.x=f.x-t.w;t.vx=0;}
      else if(m===oR){t.x=f.x+f.w;t.vx=0;}
    });
    if(ov(gPlayer,t)){
      const oT=(gPlayer.y+gPlayer.h)-t.y,oB=(t.y+t.h)-gPlayer.y,oL=(gPlayer.x+gPlayer.w)-t.x,oR=(t.x+t.w)-gPlayer.x,m=Math.min(oT,oB,oL,oR);
      if(m===oB&&t.vy>2){
        // Bloc qui tombe sur le joueur → écrasement
        killPlayer();
      }else if(m===oT&&gPlayer.vy>=0){gPlayer.y=t.y-gPlayer.h;gPlayer.vy=0;gPlayer.onGround=true;}
      else if(m===oB&&gPlayer.vy<0){gPlayer.y=t.y+t.h;gPlayer.vy=0;}
      else if(m===oL){t.vx=Math.max(t.vx,gPlayer.vx*0.5);gPlayer.x=t.x-gPlayer.w;}
      else if(m===oR){t.vx=Math.min(t.vx,gPlayer.vx*0.5);gPlayer.x=t.x+t.w;}
    }
    if(t.y>EH+200){t.x=t.ox;t.y=t.oy;t.vx=0;t.vy=0;}
  });

  // ── Bounce ────────────────────────────────────────────────
  (gLv.bounce||[]).forEach(p=>{
    if(!ov(gPlayer,p))return;
    const oL=(gPlayer.x+gPlayer.w)-p.x,oR=(p.x+p.w)-gPlayer.x,oT=(gPlayer.y+gPlayer.h)-p.y,oB=(p.y+p.h)-gPlayer.y,m=Math.min(oL,oR,oT,oB);
    const bf=JSPD*(1+(p.force-1)*0.15);
    const gd2=gPlayer.gravDir;
    if(m===oT&&gd2==='d'){gPlayer.y=p.y-gPlayer.h;gPlayer.vy=-bf;gPlayer.onGround=false;gPlayer.sq=0.5;spawnP(gPlayer.x+11,gPlayer.y+gPlayer.h,'#f0c040',8);}
    else if(m===oB&&gd2==='u'){gPlayer.y=p.y+p.h;gPlayer.vy=bf;gPlayer.onGround=false;gPlayer.sq=0.5;spawnP(gPlayer.x+11,gPlayer.y,'#f0c040',8);}
    else if(m===oL&&gd2==='r'){gPlayer.x=p.x-gPlayer.w;gPlayer.vx=-bf;gPlayer.onGround=false;gPlayer.sq=0.5;spawnP(gPlayer.x+gPlayer.w,gPlayer.y+11,'#f0c040',8);}
    else if(m===oR&&gd2==='l'){gPlayer.x=p.x+p.w;gPlayer.vx=bf;gPlayer.onGround=false;gPlayer.sq=0.5;spawnP(gPlayer.x,gPlayer.y+11,'#f0c040',8);}
    else if(m===oL){gPlayer.x=p.x-gPlayer.w;}else if(m===oR){gPlayer.x=p.x+p.w;}
    else if(m===oT){gPlayer.y=p.y-gPlayer.h;}else if(m===oB){gPlayer.y=p.y+p.h;}
  });

  // ── Slider ───────────────────────────────────────────────
  const SDIRS={r:[1,0],l:[-1,0],u:[0,-1],d:[0,1]};
  (gLv.slider||[]).forEach(t=>{
    const[dx,dy]=SDIRS[t.dir||'r'];
    const dist=Math.max(0,t.ox-(gPlayer.x+gPlayer.w),gPlayer.x-(t.ox+t.w),t.oy-(gPlayer.y+gPlayer.h),gPlayer.y-(t.oy+t.h));
    if(t.state==='idle'&&dist<=(t.trigDist||48))t.state='sliding';
    if(t.state==='locked'||t.state==='done'){if(t.state!=='done')res(t);return;}
    if(t.state==='sliding'){
      const step=t.speed||4,prevX=t.x,prevY=t.y;t.x+=dx*step;t.y+=dy*step;t.traveled=(t.traveled||0)+step;
      if(ov(gPlayer,t)){const oT=(gPlayer.y+gPlayer.h)-t.y;if(oT>0&&oT<22&&gPlayer.vy>=0){gPlayer.x+=t.x-prevX;gPlayer.y=t.y-gPlayer.h;gPlayer.vy=0;gPlayer.onGround=true;}}
      if(t.traveled>=(t.maxDist||160)){t.x=t.ox+dx*(t.maxDist||160);t.y=t.oy+dy*(t.maxDist||160);if(t.returns){t.state='waiting';t.waitTimer=0;}else t.state='done';}
    }else if(t.state==='waiting'){t.waitTimer=(t.waitTimer||0)+1;if(t.waitTimer>=(t.retDelay||1)*60)t.state='returning';}
    else if(t.state==='returning'){
      const rx=t.ox-t.x,ry=t.oy-t.y,len=Math.sqrt(rx*rx+ry*ry)||1,step=t.speed||4,prevX=t.x,prevY=t.y;
      t.x+=rx/len*step;t.y+=ry/len*step;t.traveled=Math.max(0,(t.traveled||0)-step);
      if(ov(gPlayer,t)){const oT=(gPlayer.y+gPlayer.h)-t.y;if(oT>0&&oT<22&&gPlayer.vy>=0){gPlayer.x+=t.x-prevX;gPlayer.y=t.y-gPlayer.h;gPlayer.vy=0;gPlayer.onGround=true;}}
      if(len<=step){t.x=t.ox;t.y=t.oy;t.traveled=0;t.state=t.loop?'cooldown':'locked';t.coolTimer=0;}
    }else if(t.state==='cooldown'){if(!t.loop){t.state='locked';}else{const d2=Math.max(0,t.ox-(gPlayer.x+gPlayer.w),gPlayer.x-(t.ox+t.w),t.oy-(gPlayer.y+gPlayer.h),gPlayer.y-(t.oy+t.h));if(d2>(t.trigDist||48))t.state='idle';}}
    if(t.state!=='done')res(t);
  });

  // ── Kill conditions ─────────────────────────────────────
  const gd3=gPlayer.gravDir;
  if(gd3==='u'&&gPlayer.y<-gPlayer.h-20)killPlayer();
  if(gd3==='d'&&gPlayer.y+gPlayer.h>gCamY+GH())killPlayer();
  if(gd3==='l'&&gPlayer.x<-50)killPlayer();
  if(gd3==='r'&&gPlayer.x+gPlayer.w>gCamX+GW()+50)killPlayer();
  if(gPlayer.y>EH+100)killPlayer();

  // ── Win ─────────────────────────────────────────────────
  const ed=Math.hypot(gPlayer.x+11-gLv.end.x,gPlayer.y+16-gLv.end.y);
  if(ed<40){
    gWon=true;gRunning=false;
    document.getElementById('win-msg').textContent=(localStorage.getItem('fl_lang')||'fr')==='fr'?
      'Temps : '+gElapsed.toFixed(1)+'s':
      'Time: '+gElapsed.toFixed(1)+'s';
    spawnP(gLv.end.x,gLv.end.y-20,PCOL.flagB,30);
    // Incrémenter completions
    if(_currentLevelId){
      _sb.from('levels').select('completions').eq('id',_currentLevelId).single()
        .then(({data:lvl})=>{
          if(lvl)_sb.from('levels').update({completions:(lvl.completions||0)+1}).eq('id',_currentLevelId).then(()=>{});
        });
    }
    // Si l'auteur termine son propre niveau → marquer author_completed
    if(_currentLevelId){
      _sb.auth.getSession().then(async({data})=>{
        if(!data.session)return;
        const{data:lvl}=await _sb.from('levels').select('user_id,author_completed').eq('id',_currentLevelId).single();
        if(lvl&&lvl.user_id===data.session.user.id&&!lvl.author_completed){
          await _sb.from('levels').update({author_completed:true}).eq('id',_currentLevelId);
          _authorCompleted=true;
          status('✅ Niveau terminé ! Tu peux maintenant le publier.');
        }
      });
    }
    setTimeout(()=>document.getElementById('ovWin').classList.add('show'),700);
  }

  // ── Camera ──────────────────────────────────────────────
  const tx=gPlayer.x-GW()*0.32;gCamX+=(tx-gCamX)*0.1;gCamX=Math.max(0,gCamX);
  const ty=gPlayer.y-GH()*0.25;gCamY+=(ty-gCamY)*0.08;gCamY=Math.max(0,Math.min(EH-GH(),gCamY));
}

function gPlatform(p){const x=Math.round(p.x),y=Math.round(p.y),w=Math.round(p.w),h=Math.round(p.h);GX.fillStyle=PCOL.plat;GX.fillRect(x,y,w,h);GX.fillStyle=PCOL.platT;GX.fillRect(x,y,w,4);GX.fillStyle=PCOL.platS;for(let i=x+7;i<x+w-4;i+=9)GX.fillRect(i,y+1,3,2);}

function gDrawPlayer(){
  const{x:px,y:py,w:pw,h:ph,facing:f,wF:wf,sq,onGround,angle}=gPlayer;
  const cx=px+pw/2,cy=py+ph/2;
  GX.save();
  GX.translate(cx,cy);
  GX.rotate((angle||0)*Math.PI/180);
  GX.scale(f>0?1:-1,sq); // flip horizontally based on facing
  GX.translate(-cx,-cy);

  if(_charSprite&&_charSprite.complete&&_charSprite.naturalWidth>0){
    // Draw external sprite
    const spriteH=ph+13; // include head height
    const spriteW=pw;
    GX.drawImage(_charSprite,px,py-13,spriteW,spriteH);
  }else{
    // Fallback: draw default procedural player
    const ls=onGround?(wf?3:-3):0;
    GX.fillStyle=PCOL.pDark;GX.fillRect(px+3,py+ph-10,7,10+(ls>0?ls:0));GX.fillRect(px+pw-10,py+ph-10,7,10+(ls<0?-ls:0));
    GX.fillStyle=PCOL.pDark;GX.fillRect(px-1,py-1,pw+2,ph-10);GX.fillStyle=PCOL.player;GX.fillRect(px,py,pw,ph-10);
    const hx=px-1,hy=py-13,hw=pw+2,hh=14;GX.fillStyle=PCOL.pDark;GX.fillRect(hx,hy,hw,hh);GX.fillStyle=PCOL.player;GX.fillRect(hx+1,hy+1,hw-2,hh-2);
    const eo=f>0?pw-9:2;GX.fillStyle='#fff';GX.fillRect(hx+2+eo,hy+3,5,5);GX.fillStyle='#222';GX.fillRect(hx+2+eo+(f>0?2:1),hy+5,2,2);
  }
  GX.restore();
}

  (gLv.mobile||[]).forEach(t=>{const x=Math.round(t.x),y=Math.round(t.y),w=Math.round(t.w),h=Math.round(t.h);GX.fillStyle='#1a3060';GX.fillRect(x,y,w,h);GX.fillStyle='#4090f0';GX.fillRect(x,y,w,4);GX.fillStyle='#80c0ff';for(let i=x+7;i<x+w-4;i+=9)GX.fillRect(i,y+1,3,2);});
  (gLv.push||[]).forEach(t=>{const x=Math.round(t.x),y=Math.round(t.y),w=Math.round(t.w),h=Math.round(t.h);GX.fillStyle='#3d2b1a';GX.fillRect(x,y,w,h);GX.fillStyle='#8b6340';GX.fillRect(x,y,w,4);GX.fillStyle='#c49a6c';for(let i=x+7;i<x+w-4;i+=9)GX.fillRect(i,y+1,3,2);});
  (gLv.bounce||[]).forEach(p=>{const x=Math.round(p.x),y=Math.round(p.y),w=Math.round(p.w),h=Math.round(p.h);GX.fillStyle='#4a5568';GX.fillRect(x,y,w,h);GX.fillStyle='#f0c040';GX.fillRect(x,y,w,4);GX.fillStyle='#fde68a';for(let i=x+7;i<x+w-4;i+=9)GX.fillRect(i,y+1,3,2);});
  (gLv.slider||[]).forEach(t=>gPlatform(t));
  (gLv.trap||[]).forEach(t=>{
    if(t.state==='gone')return;
    if(t.state==='predelay'){const progress=(t.preTimer||0)/Math.max(1,(t.preDelay||0)*60),shakeAmt=1+progress*2,ox=t.x;t.x+=(Math.random()-0.5)*shakeAmt*2;gPlatform(t);t.x=ox;}
    else gPlatform(t);
  });
  // Speed zones
  (gLv.speed||[]).forEach(z=>{
    const spd=z.spd??5;
    const fast=spd>5;
    const col=spd===5?'#40c04018':fast?'#4040f018':'#f0404018';
    const border=spd===5?'#40c04044':fast?'#4040f044':'#f0404044';
    GX.fillStyle=col;GX.fillRect(z.x,z.y,z.w,z.h);
    GX.fillStyle=border;
    GX.fillRect(z.x,z.y,z.w,2);GX.fillRect(z.x,z.y+z.h-2,z.w,2);
    GX.fillRect(z.x,z.y,2,z.h);GX.fillRect(z.x+z.w-2,z.y,2,z.h);
  });
  (gLv.gravflip||[]).forEach(z=>{
    const dir=z.dir??'u';
    const c=GF_COLS[dir]||GF_COLS.u;
    GX.fillStyle=c.bg+'18';GX.fillRect(z.x,z.y,z.w,z.h);
    GX.fillStyle=c.stroke+'44';
    if(dir==='u')GX.fillRect(z.x,z.y,z.w,3);
    else if(dir==='d')GX.fillRect(z.x,z.y+z.h-3,z.w,3);
    else if(dir==='l')GX.fillRect(z.x,z.y,3,z.h);
    else if(dir==='r')GX.fillRect(z.x+z.w-3,z.y,3,z.h);
  });
  gFlag(gLv.start,PCOL.flagA,'A');
  gFlag(gLv.end,PCOL.flagB,'B');
  gParts.forEach(p=>{GX.globalAlpha=Math.max(0,p.life);GX.fillStyle=p.col;GX.beginPath();GX.arc(p.x,p.y,Math.max(0,p.r*p.life),0,Math.PI*2);GX.fill();});
  GX.globalAlpha=1;
  if(!gPlayer.dead)gDrawPlayer();
  GX.restore();

  if(gPlayer&&gPlayer.gravDir!=='d'){
    const c=GF_COLS[gPlayer.gravDir];
    GX.fillStyle=c.stroke+'aa';
    GX.font='10px "Press Start 2P"';
    GX.fillText(`G ${c.arrow}`,8,20);
  }
}

function gLoop(now){gUpdate(now);gDraw();if(gRunning||gWon)gRafId=requestAnimationFrame(gLoop);}


// ── Key handlers ──────────────────────────
document.addEventListener('keydown',e=>{
  gKeys[e.code]=true;
  if(['Space','ArrowUp','ArrowLeft','ArrowRight','ArrowDown'].includes(e.code))e.preventDefault();
  if(e.code==='Escape')stopGame();
});
document.addEventListener('keyup',e=>gKeys[e.code]=false);

// ── Win handler: increment completions ────
const _origGUpdate=gUpdate;
// We'll hook into the win detection
// Actually it's inside gUpdate - let's patch gWon detection
let _completionRecorded=false;
const _origGLoop=gLoop;
gLoop=function(now){
  _origGLoop(now);
  if(gWon&&!_completionRecorded&&_currentLevelId){
    _completionRecorded=true;
    _sb.from('levels').select('completions').eq('id',_currentLevelId).single()
      .then(({data})=>{
        if(data)_sb.from('levels').update({completions:(data.completions||0)+1}).eq('id',_currentLevelId).then(()=>{});
      });
  }
};

// ── Fullscreen ────────────────────────────
function toggleFullscreen(){
  const wrap=document.getElementById('gwrap');
  if(!document.fullscreenElement){wrap.requestFullscreen?.();document.getElementById('btn-fs').textContent='✕';}
  else{document.exitFullscreen?.();const t=_langCache[_lang()]?.studio?.gFullscreen||'⛶';document.getElementById('btn-fs').textContent=t;}
}
document.addEventListener('fullscreenchange',()=>{
  if(!document.fullscreenElement){const t=_langCache[_lang()]?.studio?.gFullscreen||'⛶';const b=document.getElementById('btn-fs');if(b)b.textContent=t;}
});

// ── Start ─────────────────────────────────
init();
</script>

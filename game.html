<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FunkyLevels</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#06060e;color:#e8e8ff;font-family:Rajdhani,sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column;}

/* ─── TOP BAR ─── */
#gtopbar{display:flex;align-items:center;gap:8px;padding:6px 12px;background:#0d0d1e;border-bottom:2px solid #1e1e40;flex-shrink:0;min-height:46px;}
.gtop-btn{font-family:'Press Start 2P',monospace;font-size:7px;padding:7px 12px;background:#12122a;border:1.5px solid #2a2a55;color:#8080cc;border-radius:3px;cursor:pointer;white-space:nowrap;transition:all .12s;}
.gtop-btn:hover{border-color:#a040f0;color:#c080ff;}
#game-title{font-family:Orbitron,monospace;font-size:10px;font-weight:900;color:#f0e040;letter-spacing:2px;margin-right:8px;}
.hud-sep{width:1px;height:28px;background:#1e1e40;margin:0 4px;flex-shrink:0;}
.hud-block{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;}
.hud-lbl{font-family:'Press Start 2P',monospace;font-size:5px;color:#4040aa;letter-spacing:1px;}
.hud-val{font-family:Orbitron,monospace;font-size:11px;font-weight:700;color:#f0e040;}
#hud-timer{font-family:Orbitron,monospace;font-size:16px;font-weight:900;color:#f0e040;min-width:60px;text-align:center;}
#test-mode-badge{display:none;font-family:'Press Start 2P',monospace;font-size:6px;padding:4px 8px;background:#2a0a0a;border:1.5px solid #f04060;color:#f04060;border-radius:3px;}

/* ─── HUD GLOBAL ─── */
#hud-global{display:flex;flex-direction:column;align-items:center;gap:1px;}
#hud-global-time{font-family:Orbitron,monospace;font-size:12px;font-weight:700;color:#f0e040;}
#hud-global-user{font-family:Orbitron,monospace;font-size:14px;font-weight:700;color:#c0a0ff;letter-spacing:1px;}
body.test-mode #hud-global-lbl,
body.test-mode #hud-global-user,
body.test-mode #hud-best{display:none!important;}

/* ─── GAME WRAP ─── */
#gwrap{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;background:#0c0c1a;}
#gwrap.show{display:flex;}
#gcanvas{display:block;image-rendering:pixelated;}

/* ─── OVERLAY ─── */
.ov{display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#00000099;backdrop-filter:blur(2px);z-index:10;}
.ov.show{display:flex;}
.ov h2{font-family:Orbitron,monospace;font-size:18px;font-weight:900;color:#f0e040;letter-spacing:3px;text-shadow:0 0 20px #f0e04088;}
.ov button{font-family:'Press Start 2P',monospace;font-size:9px;padding:12px 20px;border-radius:4px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.ov button:hover{filter:brightness(1.3);transform:translateY(-1px);}

/* F1 LIGHTS */
#f1-lights{display:none;position:absolute;top:20px;left:50%;transform:translateX(-50%);gap:12px;z-index:20;}
#f1-lights.show{display:flex;}
.f1-led{width:28px;height:28px;border-radius:50%;background:#222;border:2px solid #444;transition:background .15s,box-shadow .15s;}
.f1-led.on{background:#f04040;box-shadow:0 0 16px #f04040cc;}
.f1-led.go{background:#40f040;box-shadow:0 0 16px #40f040cc;}

/* STAR RATING */
#star-rating{display:none;align-items:center;gap:6px;margin-top:8px;}
.star-btn{font-size:24px;cursor:pointer;color:#2a2a55;transition:color .1s,transform .15s;background:none;border:none;padding:0;}
.star-btn.filled,.star-btn:hover~.star-btn{color:#f0e040;}
#star-rating:hover .star-btn{color:#f0e040;}
#star-rating .star-btn:hover~.star-btn{color:#2a2a55;}
.burst{animation:burst .25s ease-out;}
@keyframes burst{0%{transform:scale(1.5)}100%{transform:scale(1)}}

/* PUBLISH MODAL */
#publish-modal{display:none;position:fixed;inset:0;background:#000000cc;z-index:999;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
</style>
</head>
<body>

<div id="gtopbar">
  <span id="game-title">✦ FUNKYLEVELS</span>

  <div class="hud-block">

    </div>

  <!-- WIN OVERLAY -->

    <h2 id="ov-win-title">FINISHED!</h2>
    <div id="win-time-display" style="font-family:Orbitron,monospace;font-size:36px;font-weight:900;color:#f0e040;text-shadow:0 0 24px #f0e04088;font-variant-numeric:tabular-nums;"></div>
    <div id="win-record-msg" style="font-family:Rajdhani,sans-serif;font-size:15px;font-weight:700;text-align:center;min-height:22px;"></div>

    <!-- Publish section (hidden by default) -->
    <div id="publish-section" style="display:none;text-align:center;margin-top:8px;">
      <div style="font-family:'Press Start 2P',monospace;font-size:9px;color:#f0e040;letter-spacing:2px;margin-bottom:10px;">🚀 PUBLISH THIS LEVEL</div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
        <button onclick="publishAsPublic()" id="btn-pub-public" style="background:#0d2a1a;color:#40f090;border:2px solid #40f090;font-size:11px;padding:12px 20px;">🌍 PUBLIC</button>
        <button onclick="publishAsCode()" id="btn-pub-code" style="background:#1a0d2a;color:#c090f0;border:2px solid #c090f0;font-size:11px;padding:12px 20px;">🔑 BY CODE</button>
      </div>
    </div>
    <!-- Action buttons -->
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:12px;">
      <button onclick="gameRespawn()" id="btn-replay" style="background:#1a1a3a;color:#90a0f0;border:2px solid #4040aa;font-size:11px;padding:12px 20px;">🔄 RESTART</button>

      <span style="font-family:'Press Start 2P',monospace;font-size:7px;color:#4040aa;letter-spacing:1px;">RATE THIS LEVEL</span>
      <div class="inline-stars" style="display:flex;gap:6px;">
        <span class="ovstar" data-val="1" style="font-size:30px;cursor:pointer;color:#2a2a55;transition:color .1s,transform .15s;">★</span>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://ydpkyktfvpdnjjiewctf.supabase.co';
const SUPABASE_KEY='sb_publishable_q44xvrQ9qmYhv80WuCnAdg_aTkxslmD';
const _sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const _sbUrl=SUPABASE_URL;
const _sbKey=SUPABASE_KEY;
const _lang=()=>localStorage.getItem('fl_lang')||'fr';
function _getToken(){
  try{const k=Object.keys(localStorage).find(k=>k.includes('auth-token'));if(!k)return null;const o=JSON.parse(localStorage.getItem(k));return o?.access_token||o?.currentSession?.access_token||null;}catch(e){return null;}
}

// ── Lang ──────────────────────────────────────────────────
let _langCache={};
async function loadLang(l){
  if(_langCache[l])return _langCache[l];
  try{const r=await fetch('lang/'+l+'.json');const d=await r.json();_langCache[l]=d;return d;}
  catch(e){if(l!=='fr')return loadLang('fr');return {};}
}

// ── Character sprite ──────────────────────────────────────
let _charSprite=null,_charId='default';
async function loadCharacterSprite(id){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{_charSprite=img;res(img);};
    img.onerror=()=>{_charSprite=null;res(null);};
    img.src='characters/'+id+'.svg?v='+Date.now();
  });
}

const EC={style:{pointerEvents:''}};
const EH=640;
const EW=3200;

let _currentLevelId=null;
let _isOwner=false;
let lv=null;
let _bestTime=null;
let _gameStartTime=0;
let _timerRunning=false;
let _currentTimeMs=0;
let _timerRaf=null;
let _levelData=null;
let _attempt=0;

function showWinScreen(ms,prevBest,isNewRecord,l){
  const isTestMode=new URLSearchParams(window.location.search).get('from')==='studio';
  const timeEl=document.getElementById('win-time-display');
  if(timeEl)timeEl.textContent=fmtTimeFull(ms);
  const recEl=document.getElementById('win-record-msg');
  const bestEl=document.getElementById('win-best-display');
  if(isTestMode){
    if(recEl){recEl.textContent='';recEl.style.display='none';}
    if(bestEl){bestEl.textContent='';bestEl.style.display='none';}
    return;
  }
  if(recEl){
    if(isNewRecord&&prevBest!==null){
      const diff=prevBest-Math.round(ms);
      recEl.style.color='#40f090';
      recEl.textContent=(l==='fr'?'🏆 NOUVEAU RECORD ! +':'🏆 NEW RECORD! +')+fmtTimeFull(diff);
    }else if(isNewRecord&&prevBest===null){
      recEl.style.color='#40f090';
      recEl.textContent=l==='fr'?'🏆 PREMIER TEMPS ENREGISTRÉ !':'🏆 FIRST TIME RECORDED!';
    }else{
      const diff=Math.round(ms)-_bestTime;
      recEl.style.color='#f06060';
      recEl.textContent='xxxxxx'.replace('xxxxxx','+'+fmtTimeFull(diff)+(l==='fr'?' du record':' from best'));
    }
  }
  const bestEl2=document.getElementById('win-best-display');
  if(bestEl2){
    bestEl2.textContent=_bestTime!==null?(l==='fr'?'MON RECORD : ':'MY BEST: ')+fmtTimeFull(_bestTime):'';
  }
}

let _pendingVisibility=null;
function publishAsPublic(){openPublishModal('public');}
function publishAsCode(){openPublishModal('code');}

async function openPublishModal(visibility){
  _pendingVisibility=visibility;
  const l=_lang();
  const token=_getToken();
  let currentTitle='';
  try{
    const r=await fetch(_sbUrl+'/rest/v1/levels?select=title&id=eq.'+_currentLevelId,{headers:{'apikey':_sbKey,'Authorization':'Bearer '+(token||_sbKey)}});
    const arr=await r.json();
    currentTitle=arr&&arr[0]?arr[0].title||'':'';
  }catch(e){}
  const modal=document.getElementById('publish-modal');
  const input=document.getElementById('pub-name-input');
  const title=document.getElementById('pub-modal-title');
  const confirmBtn=document.getElementById('pub-confirm-btn');
  const _pt=_langCache[l]?.publish||{};
  if(title)title.textContent=visibility==='public'?'🌍 '+(_pt.pubMakePublic||(l==='fr'?'RENDRE PUBLIC':'MAKE PUBLIC')):'🔑 '+(_pt.pubByCode||(l==='fr'?'PUBLIER PAR CODE':'PUBLISH BY CODE'));
  if(input){input.value=currentTitle;input.placeholder=_pt.pubNamePh||(l==='fr'?'Mon niveau funky...':'My funky level...');}
  if(confirmBtn)confirmBtn.textContent=visibility==='public'?'🌍 '+(_pt.pubConfirm||(l==='fr'?'PUBLIER':'PUBLISH')):'🔑 '+(_pt.pubConfirm||(l==='fr'?'PUBLIER':'PUBLISH'));
  if(modal)modal.style.display='flex';
  setTimeout(()=>{if(input){input.focus();input.select();}},100);
}

function cancelPublish(){
  document.getElementById('publish-modal').style.display='none';
  _pendingVisibility=null;
}

async function confirmPublish(){
  if(!_pendingVisibility)return;
  const input=document.getElementById('pub-name-input');
  const newTitle=(input?input.value.trim():'')||'Mon niveau';
  const confirmBtn=document.getElementById('pub-confirm-btn');
  if(confirmBtn){confirmBtn.disabled=true;confirmBtn.textContent='⏳...';}
  const token=_getToken();
  const _ptc=_langCache[l]?.publish||{};if(!token){alert(_ptc.pubNeedLogin||(l==='fr'?'Non connecté':'Not logged in'));return;}
  let ok=false;
  if(_currentLevelId){
    const r=await fetch(_sbUrl+'/rest/v1/levels?id=eq.'+_currentLevelId,{
      method:'PATCH',
      headers:{'apikey':_sbKey,'Authorization':'Bearer '+token,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({title:newTitle,visibility:_pendingVisibility,is_published:true,author_completed:true})
    });
    ok=r.ok;
  }else{
    const levelData=lv||JSON.parse(sessionStorage.getItem('fl_preview_level')||'null');
    if(!levelData){alert(_ptc.pubNoData||(l==='fr'?'Données du niveau introuvables':'Level data not found'));return;}
    function genCode(){const r=()=>Math.floor(Math.random()*90000+10000);return r()+'-'+r()+'-'+r();}
    const uid=JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))).sub;
    const r=await fetch(_sbUrl+'/rest/v1/levels',{
      method:'POST',
      headers:{'apikey':_sbKey,'Authorization':'Bearer '+token,'Content-Type':'application/json','Prefer':'return=representation'},
      body:JSON.stringify({user_id:uid,title:newTitle,data:levelData,visibility:_pendingVisibility,is_published:true,author_completed:true,share_code:genCode(),plays:0,completions:0})
    });
    ok=r.ok;
    if(ok){const arr=await r.json();if(arr&&arr[0])_currentLevelId=arr[0].id;}
  }
  if(!ok){if(confirmBtn){confirmBtn.disabled=false;confirmBtn.textContent='🚀 PUBLIER';}alert(_ptc.pubError||(l==='fr'?'Erreur lors de la publication':'Publication error'));return;}
  document.getElementById('publish-modal').style.display='none';
  window.location.href='index.html';
}

function goToEditor(){
  if(_currentLevelId){
    if(lv){
      const lvStr=JSON.stringify(lv);
      sessionStorage.setItem('fl_autosave_level',lvStr);
      sessionStorage.setItem('fl_autosave_id',_currentLevelId);
      sessionStorage.setItem('fl_autosave_name',_levelData?.title||'');
      sessionStorage.setItem('fl_preview_level',lvStr);
      sessionStorage.setItem('fl_preview_id',_currentLevelId);
      sessionStorage.setItem('fl_preview_title',_levelData?.title||'');
    }
    sessionStorage.setItem('fl_from_game','1');
    window.location.href='studio.html';
  }else{
    window.history.back();
  }
}

function goToIndex(){
  stopTimer();
  gRunning=false;
  window.location.href='index.html';
}

// ── Timer ─────────────────────────────────────────────────
function startTimer(){_gameStartTime=performance.now()-_currentTimeMs;_timerRunning=true;_timerRaf=requestAnimationFrame(_tickTimer);}
function stopTimer(){_timerRunning=false;if(_timerRaf){cancelAnimationFrame(_timerRaf);_timerRaf=null;}}
function resetTimer(){stopTimer();_currentTimeMs=0;const el=document.getElementById('hud-timer');if(el)el.textContent='0.00';}
function _tickTimer(){
  if(!_timerRunning)return;
  _currentTimeMs=performance.now()-_gameStartTime;
  const el=document.getElementById('hud-timer');
  if(el)el.textContent=fmtTimer(_currentTimeMs);
  _timerRaf=requestAnimationFrame(_tickTimer);
}
function fmtTimer(ms){const s=Math.floor(ms/1000);const cs=Math.floor((ms%1000)/10);return s+'.'+String(cs).padStart(2,'0');}
function fmtTimeFull(ms){const min=Math.floor(ms/60000);const s=Math.floor((ms%60000)/1000);const cs=Math.floor((ms%1000)/10);return(min>0?min+'m ':'')+s+'.'+String(cs).padStart(2,'0')+'s';}

// ── F1 Lights ─────────────────────────────────────────────
function f1Start(callback){
  const lights=document.getElementById('f1-lights');
  lights.classList.add('show');
  const leds=[0,1,2].map(i=>document.getElementById('led'+i));
  leds.forEach(l=>{l.classList.remove('on','go');});
  let step=0;
  function lightUp(){
    if(step<3){leds[step].classList.add('on');step++;setTimeout(lightUp,700);}
    else{setTimeout(()=>{leds.forEach(l=>{l.classList.remove('on');l.classList.add('go');});setTimeout(()=>{lights.classList.remove('show');leds.forEach(l=>l.classList.remove('go'));callback();},400);},800);}
  }
  setTimeout(lightUp,300);
}

// ── Leaderboard ───────────────────────────────────────────
async function loadBestTime(){
  if(!_currentLevelId)return;
  const l=_lang();
  const{data:sess}=await _sb.auth.getSession();
  if(sess.session){
    const{data:personal}=await _sb.from('leaderboard').select('time_ms').eq('level_id',_currentLevelId).eq('user_id',sess.session.user.id).order('time_ms',{ascending:true}).limit(1).maybeSingle();
    _bestTime=personal?personal.time_ms:null;
  }
  const{data:global}=await _sb.from('leaderboard').select('time_ms, user_id').eq('level_id',_currentLevelId).order('time_ms',{ascending:true}).limit(1).maybeSingle();
  if(global){
    const{data:profile}=await _sb.from('profiles').select('username').eq('id',global.user_id).single();
    const username=profile?.username||'???';
    const el_time=document.getElementById('hud-global-time');
    const el_user=document.getElementById('hud-global-user');
    if(el_time)el_time.textContent=fmtTimeFull(global.time_ms);
    if(el_user)el_user.textContent='@'+username;
  }
  const lblG=document.getElementById('hud-global-lbl');
  const lblP=document.getElementById('hud-personal-lbl');
  if(lblG)lblG.textContent=l==='fr'?'RECORD MONDIAL':'WORLD RECORD';
  if(lblP)lblP.textContent=l==='fr'?'MON RECORD':'MY BEST';
  updateBestDisplay();
}
function updateBestDisplay(){
  const el=document.getElementById('hud-best');
  if(!el)return;
  el.textContent=_bestTime!==null?fmtTimeFull(_bestTime):'—';
}

// ── Star Rating ───────────────────────────────────────────
let _userRating=0;
function initStarRating(){
  const container=document.getElementById('star-rating');
  if(!container)return;
  const stars=container.querySelectorAll('.star-btn');
  loadUserRating();
  stars.forEach(star=>{
    const val=parseInt(star.dataset.val);
    star.onmouseenter=()=>{stars.forEach(s=>{s.classList.toggle('hover',parseInt(s.dataset.val)<=val);s.classList.remove('filled');});};
    star.onmouseleave=()=>{stars.forEach(s=>s.classList.remove('hover'));updateStarDisplay(_userRating);};
    star.onclick=async()=>{await saveRating(val);};
  });
  container.style.display='flex';
}
function updateStarDisplay(rating){

function startGameFrom(sx,sy){
  if(GC.width<10||GC.height<10)resizeGameCanvas();
  gLv=JSON.parse(JSON.stringify(lv));
  (gLv.trap||[]).forEach(t=>{t.state='idle';t.vy=0;t.y=t.oy;t._carryingPlayer=false;});
  (gLv.slider||[]).forEach(s=>{s.state='idle';s.x=s.ox;s.y=s.oy;s.traveled=0;s.waitTimer=0;});
  (gLv.mobile||[]).forEach(m=>{m.x=m.ox;m.y=m.oy;m.t=0;m.going=true;});
  (gLv.push||[]).forEach(p=>{p.x=p.ox;p.y=p.oy;p.vx=0;p.vy=0;});
  (gLv.gravflip||[]).forEach(z=>{if(z.dir===undefined){z.dir=(z.grav??-10)<0?'u':'d';z.strength=Math.abs(z.grav??10);}});
  (gLv.spike||[]).forEach(s=>{s.state='idle';s.timer=0;});
  (gLv.gblock||[]).forEach(g=>{g._attached=false;g._justJumped=false;});
  // ── CORRECTION : initialiser les blocs flash ──────────
  (gLv.flash||[]).forEach(f=>{f._visible=true;f._timer=0;});
  gParts=[];gBullets=[];gLives=3;gElapsed=0;gWon=false;gRunning=false;gDeadPending=false;
  gStartTime=performance.now();
  gCamX=Math.max(0,sx-GW()*0.32);
  gCamY=Math.max(0,Math.min(EH-GH(),(sy-36)-GH()*0.25));
  initPlayer(sx,sy);
  document.getElementById('gwrap').classList.add('show');
  document.querySelectorAll('.ov').forEach(o=>o.classList.remove('show'));
  _attempt++;updateAttemptDisplay();
  resetTimer();
  if(gRafId){cancelAnimationFrame(gRafId);gRafId=null;}
  requestAnimationFrame(()=>{
    gDraw();
    if(_attempt===1){f1Start(()=>{gRunning=true;gLoopStart();startTimer();});}
    else{gRunning=true;gLoopStart();startTimer();}
  });
}

//  GAME ENGINE

const GC=document.getElementById('gcanvas');
const GX=GC.getContext('2d');
function GW(){return GC.width;}
function GH(){return GC.height;}

const GRAV=0.55,JSPD=12.5,SPD=4;
const PCOL={bg:'#0c0c1a',plat:'#4a5568',platT:'#718096',platS:'#a0aec0',flagA:'#68d391',flagB:'#fc8181',player:'#f6ad55',pDark:'#c05621'};
const GF_COLS={u:{bg:'#4040f0',stroke:'#8080ff',arrow:'↑'},d:{bg:'#f04040',stroke:'#ff8080',arrow:'↓'},l:{bg:'#f0a000',stroke:'#ffd060',arrow:'←'},r:{bg:'#00c060',stroke:'#60ff90',arrow:'→'}};

let gLv,gPlayer,gParts=[],gCamX=0,gCamY=0,gKeys={};
let gRafId=null;
let gLives=3,gElapsed=0,gWon=false,gRunning=false,gDeadPending=false,gStartTime=0;
let gBullets=[];

function gLoopStart(){if(gRafId)cancelAnimationFrame(gRafId);gRafId=requestAnimationFrame(gLoop);}

function resizeGameCanvas(){

function initPlayer(x,y){
  gPlayer={x,y:y-36,w:22,h:32,vx:0,vy:0,onGround:false,facing:1,wF:0,wT:0,dead:false,dT:0,sq:1,gravDir:'d',angle:0,targetAngle:0,_jumpWasHeld:false};
}

function spawnP(x,y,col,n=10){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=Math.random()*3+1;gParts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:1,decay:.032+Math.random()*.03,col,r:Math.random()*4+2});}
}

function ov(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

function res(p){
  if(!ov(gPlayer,p))return false;
  const oL=(gPlayer.x+gPlayer.w)-p.x,oR=(p.x+p.w)-gPlayer.x;
  const oT=(gPlayer.y+gPlayer.h)-p.y,oB=(p.y+p.h)-gPlayer.y;
  const m=Math.min(oL,oR,oT,oB);
  const gd=gPlayer.gravDir;
  if(m===oT){if(gd==='d'){gPlayer.y=p.y-gPlayer.h;gPlayer.vy=0;gPlayer.onGround=true;gPlayer.sq=1.15;return true;}else{gPlayer.y=p.y-gPlayer.h;gPlayer.vy=Math.min(gPlayer.vy,0);}}
  else if(m===oB){if(gd==='u'){gPlayer.y=p.y+p.h;gPlayer.vy=0;gPlayer.onGround=true;gPlayer.sq=1.15;return true;}else{gPlayer.y=p.y+p.h;gPlayer.vy=Math.max(gPlayer.vy,0);}}
  else if(m===oL){if(gd==='r'){gPlayer.x=p.x-gPlayer.w;gPlayer.vx=0;gPlayer.onGround=true;gPlayer.sq=1.15;return true;}else{gPlayer.x=p.x-gPlayer.w;}}
  else if(m===oR){if(gd==='l'){gPlayer.x=p.x+p.w;gPlayer.vx=0;gPlayer.onGround=true;gPlayer.sq=1.15;return true;}else{gPlayer.x=p.x+p.w;}}
  return false;
}

function killPlayer(){if(gPlayer.dead)return;gPlayer.dead=true;gPlayer.dT=0;spawnP(gPlayer.x+11,gPlayer.y+16,PCOL.player,20);}

// ── One jump per press ──────────────────────────────────
const JUMP_KEYS=['Space','ArrowUp','KeyW'];
let _jumpReady=true;

function gUpdate(now){
  if(!gRunning||gWon)return;
  gElapsed=(now-gStartTime)/1000;
  gParts=gParts.filter(p=>p.life>0);
  gParts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.life-=p.decay;});

  if(gPlayer.dead){
    gPlayer.dT++;
    if(gPlayer.dT>55&&!gDeadPending){
      gDeadPending=true;gRunning=false;
      stopTimer();
      setTimeout(()=>{
        document.getElementById('ovDie').classList.add('show');
        if(_currentLevelId&&_levelData&&(_levelData.visibility==='public'||_levelData.visibility==='code')&&!_isOwner){
          setTimeout(()=>showRatingOverlay('rating-inline-die'),400);
        }
      },200);
    }
    return;
  }

  let gpL=false,gpR=false,gpJ=false;
  try{const gp=navigator.getGamepads?navigator.getGamepads()[0]:null;if(gp){gpL=gp.axes[0]<-0.3||gp.buttons[14]?.pressed;gpR=gp.axes[0]>0.3||gp.buttons[15]?.pressed;gpJ=gp.buttons[0]?.pressed||gp.buttons[12]?.pressed;}}catch(e){}

  const left=gKeys['ArrowLeft']||gKeys['KeyA']||gpL;
  const right=gKeys['ArrowRight']||gKeys['KeyD']||gpR;
  const jumpHeld=gKeys['Space']||gKeys['ArrowUp']||gKeys['KeyW']||gpJ;
  if(!jumpHeld)_jumpReady=true;
  const jump=jumpHeld&&_jumpReady;

  let activeDir='d',activeStr=GRAV,inGravZone=false;
  (gLv.gravflip||[]).forEach(z=>{
    const margin=4,tz={x:z.x+margin,y:z.y+margin,w:z.w-margin*2,h:z.h-margin*2};
    if(tz.w>0&&tz.h>0&&ov(gPlayer,tz)){activeDir=z.dir??'u';activeStr=(z.strength??10)*GRAV/10;inGravZone=true;}
  });
  // ── Gblock: planet surface gravity ──────────────────────
  // La gravité suit la dernière face du gblock sur laquelle le joueur
  // s'est posé ou longe actuellement. Elle reste active tant que le joueur
  // est collé à une face (dans un mince halo de STICK pixels).
  if(!inGravZone){
    const STICK=6; // pixels de halo de "contact" autour du gblock
    (gLv.gblock||[]).forEach(g=>{
      // Zone étendue d'un halo autour du bloc
      const halo={x:g.x-STICK,y:g.y-STICK,w:g.w+STICK*2,h:g.h+STICK*2};
      if(!ov(gPlayer,halo))return;

      // Le joueur est dans le halo — on détermine la face la plus proche
      // en mesurant la pénétration de chaque côté dans le halo
      const px=gPlayer.x,py=gPlayer.y,pw=gPlayer.w,ph=gPlayer.h;
      // Distances entre le joueur et chaque face du bloc
      const dTop    = Math.abs((py+ph) - g.y);        // bas joueur vs haut bloc
      const dBottom = Math.abs(py      - (g.y+g.h));  // haut joueur vs bas bloc
      const dLeft   = Math.abs((px+pw) - g.x);        // droite joueur vs gauche bloc
      const dRight  = Math.abs(px      - (g.x+g.w));  // gauche joueur vs droite bloc

      // On ignore les faces où le joueur est clairement à l'opposé
      // (centre joueur doit être "en face" de la face pour qu'elle compte)
      const pcx=px+pw/2,pcy=py+ph/2;
      const candidates=[];
      if(pcy<=g.y+g.h && pcy>=g.y-ph)    candidates.push({dir:'d',d:dTop});     // posé sur le dessus → gravité vers le bas
      if(pcy>=g.y     && pcy<=g.y+g.h+ph) candidates.push({dir:'u',d:dBottom});  // accroché en dessous → gravité vers le haut
      if(pcx<=g.x+g.w && pcx>=g.x-pw)    candidates.push({dir:'r',d:dLeft});    // longe la face gauche → gravité vers la droite
      if(pcx>=g.x     && pcx<=g.x+g.w+pw) candidates.push({dir:'l',d:dRight});   // longe la face droite → gravité vers la gauche

      if(candidates.length===0)return;
      // Prendre la face la plus proche
      candidates.sort((a,b)=>a.d-b.d);
      activeDir=candidates[0].dir;
      activeStr=GRAV;
      inGravZone=true;
    });
  }
  gPlayer.gravDir=activeDir;

  let zoneSpd=SPD,zoneJspd=JSPD;
  (gLv.speed||[]).forEach(z=>{if(ov(gPlayer,z)){const mult=(z.spd??5)/5;zoneSpd=SPD*mult;zoneJspd=JSPD*mult;}});

  const gd=gPlayer.gravDir;
  const isHorizGrav=(gd==='l'||gd==='r');
  if(isHorizGrav){
    if(left){gPlayer.vy=(gd==='r')?-zoneSpd:zoneSpd;gPlayer.facing=1;}
    else if(right){gPlayer.vy=(gd==='r')?zoneSpd:-zoneSpd;gPlayer.facing=-1;}
    else gPlayer.vy*=0.75;
    if(jump&&gPlayer.onGround){gPlayer.vx=(gd==='r')?-zoneJspd:zoneJspd;gPlayer.onGround=false;gPlayer.sq=0.6;spawnP(gPlayer.x+(gd==='r'?gPlayer.w:0),gPlayer.y+gPlayer.h/2,'#ffffff20',5);_jumpReady=false;}
  }else{
    if(left){gPlayer.vx=-zoneSpd;gPlayer.facing=-1;}
    else if(right){gPlayer.vx=zoneSpd;gPlayer.facing=1;}
    else gPlayer.vx*=0.75;
    if(jump&&gPlayer.onGround){gPlayer.vy=(gd==='d')?-zoneJspd:zoneJspd;gPlayer.onGround=false;gPlayer.sq=0.6;spawnP(gPlayer.x+11,gPlayer.y+(gd==='d'?32:0),'#ffffff20',5);_jumpReady=false;}
  }

  const moveSpd=isHorizGrav?Math.abs(gPlayer.vy):Math.abs(gPlayer.vx);
  if(moveSpd>0.5&&gPlayer.onGround){gPlayer.wT++;if(gPlayer.wT>7){gPlayer.wF^=1;gPlayer.wT=0;}}
  else if(gPlayer.onGround)gPlayer.wF=0;
  gPlayer.sq+=(1-gPlayer.sq)*0.18;

  if(gd==='d')gPlayer.vy=Math.min(gPlayer.vy+activeStr,20);
  else if(gd==='u')gPlayer.vy=Math.max(gPlayer.vy-activeStr,-20);
  else if(gd==='r')gPlayer.vx=Math.min(gPlayer.vx+activeStr,20);
  else if(gd==='l')gPlayer.vx=Math.max(gPlayer.vx-activeStr,-20);

  const TARGET_ANGLES={d:0,u:180,r:270,l:90};
  gPlayer.targetAngle=TARGET_ANGLES[gd]||0;
  const angleDiff=((gPlayer.targetAngle-(gPlayer.angle||0))+540)%360-180;
  gPlayer.angle=(gPlayer.angle||0)+Math.sign(angleDiff)*Math.min(15,Math.abs(angleDiff));

  gPlayer.x+=gPlayer.vx;
  gPlayer.y+=gPlayer.vy;
  gPlayer.x=Math.max(0,gPlayer.x);
  gPlayer.onGround=false;

  // ── Traps ──────────────────────────────────────────────
  (gLv.trap||[]).forEach(t=>{
    if(t.state==='gone')return;
    const dist=Math.max(0,t.ox-(gPlayer.x+gPlayer.w),gPlayer.x-(t.ox+t.w),t.oy-(gPlayer.y+gPlayer.h),gPlayer.y-(t.oy+t.h));
    if(t.state==='idle'&&dist<=t.trigDist){t.state='predelay';t.preTimer=0;t.vy=0;}
    if(t.state==='predelay'){if(dist>t.trigDist){t.state='idle';t.preTimer=0;}else{t.preTimer=(t.preTimer||0)+1;if(t.preTimer>=(t.preDelay||0)*60)t.state='falling';}}
    if(t.state==='falling'){
      t.vy+=(t.fallSpeed||1)*0.6;t.y+=t.vy;t._carryingPlayer=false;
      const maxY=t.partial?(t.oy+(t.partDist||80)):(EH+100);
      if(t.y>=maxY){t.y=maxY;t.vy=0;if(t.returns){t.state='waiting';t.waitTimer=0;}else{t.state=t.partial?'locked':'gone';}}
    }else if(t.state==='waiting'){t.waitTimer=(t.waitTimer||0)+1;if(t.waitTimer>=(t.riseDelay||2)*60){t.state='rising';t.vy=0;}}
    else if(t.state==='rising'){t.y-=4;if(t.y<=t.oy){t.y=t.oy;t.vy=0;t.state='cooldown';}}
    else if(t.state==='cooldown'){if(!t.loop){t.state='locked';}else{const d2=Math.max(0,t.ox-(gPlayer.x+gPlayer.w),gPlayer.x-(t.ox+t.w),t.oy-(gPlayer.y+gPlayer.h),gPlayer.y-(t.oy+t.h));if(d2>t.trigDist)t.state='idle';}}
    if(t.state==='gone')return;
    if(['falling','idle','predelay','waiting','cooldown','locked'].includes(t.state)){
      if(ov(gPlayer,t)){const oT=(gPlayer.y+gPlayer.h)-t.y,oB=(t.y+t.h)-gPlayer.y,oL=(gPlayer.x+gPlayer.w)-t.x,oR=(t.x+t.w)-gPlayer.x,m=Math.min(oT,oB,oL,oR);
        if(m===oT){gPlayer.y=t.y-gPlayer.h;gPlayer.vy=t.state==='falling'?t.vy:0;gPlayer.onGround=true;gPlayer.sq=1.1;if(t.state==='falling'){t._carryingPlayer=true;}}
        else if(m===oB&&gPlayer.vy<0){gPlayer.y=t.y+t.h;gPlayer.vy=0;}
        else if(m===oL){gPlayer.x=t.x-gPlayer.w;}else if(m===oR){gPlayer.x=t.x+t.w;}
      }
    }
  });

  gLv.fixed.forEach(p=>res(p));
  (gLv.invis||[]).forEach(p=>res(p));

  // ── CORRECTION : blocs flash — clignotement + collision ──
  (gLv.flash||[]).forEach(f=>{
    f._timer=(f._timer||0)+1;
    const period=Math.round((f.freq||1)*60);
    if(f._timer>=period){f._timer=0;f._visible=!f._visible;}
    if(f._visible)res(f);
  });

  const MO_VEC={r:[1,0],l:[-1,0],u:[0,-1],d:[0,1]};
  (gLv.mobile||[]).forEach(t=>{
    const[dx,dy]=MO_VEC[t.dir||'r'],spd=t.speed||2,prevX=t.x,prevY=t.y;
    if(t.going){t.x+=dx*spd;t.y+=dy*spd;t.t=(t.t||0)+spd;if(t.t>=(t.dist||160)){t.t=t.dist||160;t.going=false;}}
    else{t.x-=dx*spd;t.y-=dy*spd;t.t=(t.t||0)-spd;if(t.t<=0){t.t=0;t.x=t.ox;t.y=t.oy;t.going=true;}}
    if(ov(gPlayer,t)){
      const oT=(gPlayer.y+gPlayer.h)-t.y;
      if(oT>0&&oT<20&&gPlayer.vy>=0){gPlayer.x+=t.x-prevX;gPlayer.y=t.y-gPlayer.h;gPlayer.vy=0;gPlayer.onGround=true;}
      else res(t);
    }
  });

  (gLv.push||[]).forEach(t=>{
    t.vy=(t.vy||0)+GRAV;t.vy=Math.min(t.vy,20);t.vx=(t.vx||0)*(t.fric||0.8);t.x+=t.vx;t.y+=t.vy;
    const solidBlocks=[...gLv.fixed,...(gLv.invis||[]),...(gLv.mobile||[]),...(gLv.bounce||[])];
    solidBlocks.forEach(f=>{
      if(!ov(t,f))return;
      const oT=(t.y+t.h)-f.y,oB=(f.y+f.h)-t.y,oL=(t.x+t.w)-f.x,oR=(f.x+f.w)-t.x,m=Math.min(oT,oB,oL,oR);
      if(m===oT&&t.vy>=0){t.y=f.y-t.h;t.vy=0;}
      else if(m===oB&&t.vy<0){t.y=f.y+f.h;t.vy=0;}
      else if(m===oL){t.x=f.x-t.w;t.vx=0;}
      else if(m===oR){t.x=f.x+f.w;t.vx=0;}
    });
    if(ov(gPlayer,t)){
      const oT=(gPlayer.y+gPlayer.h)-t.y,oB=(t.y+t.h)-gPlayer.y,oL=(gPlayer.x+gPlayer.w)-t.x,oR=(t.x+t.w)-gPlayer.x,m=Math.min(oT,oB,oL,oR);
      if(m===oB&&t.vy>2){killPlayer();}
      else if(m===oT&&gPlayer.vy>=0){gPlayer.y=t.y-gPlayer.h;gPlayer.vy=0;gPlayer.onGround=true;}
      else if(m===oB&&gPlayer.vy<0){gPlayer.y=t.y+t.h;gPlayer.vy=0;}
      else if(m===oL){t.vx=Math.max(t.vx,gPlayer.vx*0.5);gPlayer.x=t.x-gPlayer.w;}
      else if(m===oR){t.vx=Math.min(t.vx,gPlayer.vx*0.5);gPlayer.x=t.x+t.w;}
    }
    if(t.y>EH+200){t.x=t.ox;t.y=t.oy;t.vx=0;t.vy=0;}
  });

  (gLv.bounce||[]).forEach(p=>{
    if(!ov(gPlayer,p))return;
    const oL=(gPlayer.x+gPlayer.w)-p.x,oR=(p.x+p.w)-gPlayer.x,oT=(gPlayer.y+gPlayer.h)-p.y,oB=(p.y+p.h)-gPlayer.y,m=Math.min(oL,oR,oT,oB);
    const bf=JSPD*(1+(p.force-1)*0.15);
    const gd2=gPlayer.gravDir;
    if(m===oT&&gd2==='d'){gPlayer.y=p.y-gPlayer.h;gPlayer.vy=-bf;gPlayer.onGround=false;gPlayer.sq=0.5;spawnP(gPlayer.x+11,gPlayer.y+gPlayer.h,'#f0c040',8);}
    else if(m===oB&&gd2==='u'){gPlayer.y=p.y+p.h;gPlayer.vy=bf;gPlayer.onGround=false;gPlayer.sq=0.5;spawnP(gPlayer.x+11,gPlayer.y,'#f0c040',8);}
    else if(m===oL&&gd2==='r'){gPlayer.x=p.x-gPlayer.w;gPlayer.vx=-bf;gPlayer.onGround=false;spawnP(gPlayer.x+gPlayer.w,gPlayer.y+11,'#f0c040',8);}
    else if(m===oR&&gd2==='l'){gPlayer.x=p.x+p.w;gPlayer.vx=bf;gPlayer.onGround=false;spawnP(gPlayer.x,gPlayer.y+11,'#f0c040',8);}
    else if(m===oL)gPlayer.x=p.x-gPlayer.w;else if(m===oR)gPlayer.x=p.x+p.w;
    else if(m===oT)gPlayer.y=p.y-gPlayer.h;else if(m===oB)gPlayer.y=p.y+p.h;
  });

  const SDIRS={r:[1,0],l:[-1,0],u:[0,-1],d:[0,1]};
  (gLv.slider||[]).forEach(t=>{
    const[dx,dy]=SDIRS[t.dir||'r'];
    const dist=Math.max(0,t.ox-(gPlayer.x+gPlayer.w),gPlayer.x-(t.ox+t.w),t.oy-(gPlayer.y+gPlayer.h),gPlayer.y-(t.oy+t.h));
    if(t.state==='idle'&&dist<=(t.trigDist||48))t.state='sliding';
    if(t.state==='locked'||t.state==='done'){if(t.state!=='done')res(t);return;}
    if(t.state==='sliding'){
      const step=t.speed||4,prevX=t.x,prevY=t.y;t.x+=dx*step;t.y+=dy*step;t.traveled=(t.traveled||0)+step;
      if(ov(gPlayer,t)){const oT=(gPlayer.y+gPlayer.h)-t.y;if(oT>0&&oT<22&&gPlayer.vy>=0){gPlayer.x+=t.x-prevX;gPlayer.y=t.y-gPlayer.h;gPlayer.vy=0;gPlayer.onGround=true;}}
      if(t.traveled>=(t.maxDist||160)){t.x=t.ox+dx*(t.maxDist||160);t.y=t.oy+dy*(t.maxDist||160);if(t.returns){t.state='waiting';t.waitTimer=0;}else t.state='done';}
    }else if(t.state==='waiting'){t.waitTimer=(t.waitTimer||0)+1;if(t.waitTimer>=(t.retDelay||1)*60)t.state='returning';}
    else if(t.state==='returning'){
      const rx=t.ox-t.x,ry=t.oy-t.y,len=Math.sqrt(rx*rx+ry*ry)||1,step=t.speed||4,prevX=t.x,prevY=t.y;
      t.x+=rx/len*step;t.y+=ry/len*step;t.traveled=Math.max(0,(t.traveled||0)-step);
      if(ov(gPlayer,t)){const oT=(gPlayer.y+gPlayer.h)-t.y;if(oT>0&&oT<22&&gPlayer.vy>=0){gPlayer.x+=t.x-prevX;gPlayer.y=t.y-gPlayer.h;gPlayer.vy=0;gPlayer.onGround=true;}}
      if(len<=step){t.x=t.ox;t.y=t.oy;t.traveled=0;t.state=t.loop?'cooldown':'locked';}
    }else if(t.state==='cooldown'){if(!t.loop){t.state='locked';}else{const d2=Math.max(0,t.ox-(gPlayer.x+gPlayer.w),gPlayer.x-(t.ox+t.w),t.oy-(gPlayer.y+gPlayer.h),gPlayer.y-(t.oy+t.h));if(d2>(t.trigDist||48))t.state='idle';}}
    if(t.state!=='done')res(t);
  });

  // ── Spike collision ──────────────────────────────────────
  (gLv.spike||[]).forEach(sp=>{
    const isActive=(sp.mode||'always')==='always'||sp.state==='active';
    if(isActive&&ov(gPlayer,sp))killPlayer();
  });

  if(gPlayer.y>EH+100)killPlayer();
  if(gPlayer.gravDir==='u'&&gPlayer.y<-200)killPlayer();
  if(gPlayer.gravDir==='l'&&gPlayer.x<-200)killPlayer();
  if(gPlayer.gravDir==='r'&&gPlayer.x>EW+200)killPlayer();

  // ── Win ───────────────────────────────────────────────
  if(!gLv.end)return;
  const ed=Math.hypot(gPlayer.x+11-gLv.end.x,gPlayer.y+16-gLv.end.y);
  if(ed<40){
    gWon=true;gRunning=false;
    stopTimer();
    const winTime=_currentTimeMs;
    const l=_lang();
    spawnP(gLv.end.x,gLv.end.y-20,PCOL.flagB,30);
    const prevBest=_bestTime;
    saveTime(winTime).then(isNewRecord=>{
      showWinScreen(winTime,prevBest,isNewRecord,l);
    });
    if(_currentLevelId){
      fetch(_sbUrl+'/rest/v1/levels?id=eq.'+_currentLevelId,{method:'PATCH',headers:{'apikey':_sbKey,'Authorization':'Bearer '+(_getToken()||_sbKey),'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({completions:(_levelData?.completions||0)+1})});
    }
    (async()=>{
      const isTestMode=new URLSearchParams(window.location.search).get('from')==='studio';
      const btnEdit=document.getElementById('btn-edit-win');
      if(!_currentLevelId){
        if(isTestMode){const pubSection=document.getElementById('publish-section');if(pubSection)pubSection.style.display='block';if(btnEdit)btnEdit.style.display='';}
        return;
      }
      const token=_getToken();if(!token)return;
      try{
        const r=await fetch(_sbUrl+'/rest/v1/levels?select=user_id,author_completed,visibility&id=eq.'+_currentLevelId,{headers:{'apikey':_sbKey,'Authorization':'Bearer '+token}});
        if(!r.ok)return;
        const arr=await r.json();const lvl=arr&&arr[0];if(!lvl)return;
        let uid=null;try{uid=JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))).sub;}catch(e){}
        if(!uid||lvl.user_id!==uid)return;
        if(!lvl.author_completed){fetch(_sbUrl+'/rest/v1/levels?id=eq.'+_currentLevelId,{method:'PATCH',headers:{'apikey':_sbKey,'Authorization':'Bearer '+token,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({author_completed:true})});}
        if(isTestMode){if(btnEdit)btnEdit.style.display='';}
        if(lvl.visibility==='private'){if(btnEdit)btnEdit.style.display='';const pubSection=document.getElementById('publish-section');if(pubSection)pubSection.style.display='block';}
      }catch(e){}
    })();
    setTimeout(()=>{
      document.getElementById('ovWin').classList.add('show');
      if(_currentLevelId&&_levelData&&(_levelData.visibility==='public'||_levelData.visibility==='code')&&!_isOwner){
        setTimeout(()=>showRatingOverlay('rating-inline-win'),800);
      }
    },600);
  }

  const tx=gPlayer.x-GW()*0.32;gCamX+=(tx-gCamX)*0.1;gCamX=Math.max(0,gCamX);
  const ty=gPlayer.y-GH()*0.25;gCamY+=(ty-gCamY)*0.08;gCamY=Math.max(0,Math.min(EH-GH(),gCamY));
}

// ── Draw ──────────────────────────────────────────────────
function gPlatform(p){const x=Math.round(p.x),y=Math.round(p.y),w=Math.round(p.w),h=Math.round(p.h);GX.fillStyle=PCOL.plat;GX.fillRect(x,y,w,h);GX.fillStyle=PCOL.platT;GX.fillRect(x,y,w,4);GX.fillStyle=PCOL.platS;for(let i=x+7;i<x+w-4;i+=9)GX.fillRect(i,y+1,3,2);}
function gFlag(pos,col,lbl){GX.fillStyle='#888';GX.fillRect(pos.x+12,pos.y-50,3,50);GX.fillStyle=col;GX.beginPath();GX.moveTo(pos.x+15,pos.y-50);GX.lineTo(pos.x+36,pos.y-38);GX.lineTo(pos.x+15,pos.y-26);GX.closePath();GX.fill();}

function gDrawPlayer(){
  const{x:px,y:py,w:pw,h:ph,facing:f,wF:wf,sq,onGround,angle,vy}=gPlayer;
  const cx=px+pw/2,cy=py+ph/2;
  const jumping=!onGround&&(vy||0)<0;
  const falling=!onGround&&(vy||0)>2;
  GX.save();
  GX.translate(cx,cy);GX.rotate((angle||0)*Math.PI/180);GX.scale(f>0?1:-1,sq);GX.translate(-cx,-cy);
  if(_charSprite&&_charSprite.complete&&_charSprite.naturalWidth>0){
    GX.drawImage(_charSprite,px,py-13,pw,ph+13);
  }else{
    const ls=onGround?(wf?3:-3):0;
    GX.fillStyle=PCOL.pDark;
    GX.fillRect(px+3,py+ph-10,7,10+(ls>0?ls:0));
    GX.fillRect(px+pw-10,py+ph-10,7,10+(ls<0?-ls:0));
    GX.fillStyle=PCOL.pDark;GX.fillRect(px-1,py-1,pw+2,ph-10);
    GX.fillStyle=PCOL.player;GX.fillRect(px,py,pw,ph-10);
    if(jumping){GX.fillStyle=PCOL.pDark;GX.fillRect(px-5,py-2,5,8);GX.fillRect(px+pw,py-2,5,8);}
    else if(falling){GX.fillStyle=PCOL.pDark;GX.fillRect(px-6,py+4,6,5);GX.fillRect(px+pw,py+4,6,5);}
    else if(onGround&&Math.abs(gPlayer.vx||0)>0.5){const swing=wf?4:-4;GX.fillStyle=PCOL.pDark;GX.fillRect(px-4,py+4+swing,4,7);GX.fillRect(px+pw,py+4-swing,4,7);}
    else{GX.fillStyle=PCOL.pDark;GX.fillRect(px-4,py+6,4,8);GX.fillRect(px+pw,py+6,4,8);}
    const hx=px-1,hy=py-13,hw=pw+2,hh=14;
    GX.fillStyle=PCOL.pDark;GX.fillRect(hx,hy,hw,hh);
    GX.fillStyle=PCOL.player;GX.fillRect(hx+1,hy+1,hw-2,hh-2);
    const eo=pw-9;
    GX.fillStyle='#fff';GX.fillRect(hx+2+eo,hy+3,5,5);
    GX.fillStyle='#222';GX.fillRect(hx+2+eo+2,hy+5,2,2);
  }
  GX.restore();
}

function gDraw(){
  GX.fillStyle=PCOL.bg;GX.fillRect(0,0,GW(),GH());
  GX.save();GX.translate(-Math.round(gCamX),-Math.round(gCamY));
  gLv.fixed.forEach(p=>gPlatform(p));
  (gLv.mobile||[]).forEach(t=>{const x=Math.round(t.x),y=Math.round(t.y),w=Math.round(t.w),h=Math.round(t.h);GX.fillStyle='#1a3060';GX.fillRect(x,y,w,h);GX.fillStyle='#4090f0';GX.fillRect(x,y,w,4);});
  (gLv.push||[]).forEach(t=>{const x=Math.round(t.x),y=Math.round(t.y),w=Math.round(t.w),h=Math.round(t.h);GX.fillStyle='#3d2b1a';GX.fillRect(x,y,w,h);GX.fillStyle='#8b6340';GX.fillRect(x,y,w,4);});
  (gLv.bounce||[]).forEach(p=>{const x=Math.round(p.x),y=Math.round(p.y),w=Math.round(p.w),h=Math.round(p.h);GX.fillStyle='#4a5568';GX.fillRect(x,y,w,h);GX.fillStyle='#f0c040';GX.fillRect(x,y,w,4);});
  (gLv.slider||[]).forEach(t=>{if(t.state!=='done')gPlatform(t);});
  (gLv.trap||[]).forEach(t=>{
    if(t.state==='gone')return;
    if(t.state==='predelay'){const shakeAmt=1+((t.preTimer||0)/Math.max(1,(t.preDelay||0)*60))*2,ox=t.x;t.x+=(Math.random()-0.5)*shakeAmt*2;gPlatform(t);t.x=ox;}
    else gPlatform(t);
  });
  (gLv.speed||[]).forEach(z=>{
    const spd=z.spd??5,fast=spd>5;
    GX.fillStyle=spd===5?'#40c04018':fast?'#4040f018':'#f0404018';GX.fillRect(z.x,z.y,z.w,z.h);
    GX.fillStyle=spd===5?'#40c04044':fast?'#4040f044':'#f0404044';
    GX.fillRect(z.x,z.y,z.w,2);GX.fillRect(z.x,z.y+z.h-2,z.w,2);GX.fillRect(z.x,z.y,2,z.h);GX.fillRect(z.x+z.w-2,z.y,2,z.h);
  });
  (gLv.gravflip||[]).forEach(z=>{
    const dir=z.dir??'u',c=GF_COLS[dir]||GF_COLS.u;
    GX.fillStyle=c.bg+'18';GX.fillRect(z.x,z.y,z.w,z.h);
    GX.fillStyle=c.stroke+'44';
    if(dir==='u')GX.fillRect(z.x,z.y,z.w,3);
    else if(dir==='d')GX.fillRect(z.x,z.y+z.h-3,z.w,3);
    else if(dir==='l')GX.fillRect(z.x,z.y,3,z.h);
    else if(dir==='r')GX.fillRect(z.x+z.w-3,z.y,3,z.h);
  });

  // ── Flash blocks draw ──
  (gLv.flash||[]).forEach(f=>{
    if(!f._visible)return;
    const x=Math.round(f.x),y=Math.round(f.y),w=Math.round(f.w),h=Math.round(f.h);
    GX.fillStyle='#1a3060';GX.fillRect(x,y,w,h);
    GX.fillStyle='#40c0f0';GX.fillRect(x,y,w,4);
    GX.fillStyle='#80e0ff88';GX.font='6px "Press Start 2P"';GX.textAlign='center';
    GX.fillText('⚡',x+w/2,y+h/2+3);GX.textAlign='left';
  });

  // ── Spike blocks draw ──
  (gLv.spike||[]).forEach(sp=>{
    const x=Math.round(sp.x),y=Math.round(sp.y),w=Math.round(sp.w),h=Math.round(sp.h);
    GX.fillStyle='#2a1010';GX.fillRect(x,y,w,h);
    GX.fillStyle='#cc3030';GX.fillRect(x,y,w,4);
    const isActive=(sp.mode||'always')==='always'||sp.state==='active';
    const spikeCol=isActive?'#ff4060':'#884040';
    GX.fillStyle=spikeCol;
    const sz=10;
    const drawGameSpikes=(dir)=>{
      const horiz=(dir==='u'||dir==='d');
      const count=Math.max(1,Math.floor((horiz?w:h)/sz));
      const gap=(horiz?w:h)/count;
      for(let k=0;k<count;k++){
        const cx=horiz?x+gap*(k+0.5):x;
        const cy=horiz?y:y+gap*(k+0.5);
        GX.beginPath();
        if(dir==='u'){GX.moveTo(cx-sz/2,y);GX.lineTo(cx+sz/2,y);GX.lineTo(cx,y-sz);}
        else if(dir==='d'){GX.moveTo(cx-sz/2,y+h);GX.lineTo(cx+sz/2,y+h);GX.lineTo(cx,y+h+sz);}
        else if(dir==='l'){GX.moveTo(x,cy-sz/2);GX.lineTo(x,cy+sz/2);GX.lineTo(x-sz,cy);}
        else if(dir==='r'){GX.moveTo(x+w,cy-sz/2);GX.lineTo(x+w,cy+sz/2);GX.lineTo(x+w+sz,cy);}
        GX.closePath();GX.fill();
      }
    };
    const dir=sp.dir||'u';
    if(dir==='all'){['u','d','l','r'].forEach(d=>drawGameSpikes(d));}
    else drawGameSpikes(dir);
  });

  // ── Gravity blocks draw ──
  (gLv.gblock||[]).forEach(g=>{
    const x=Math.round(g.x),y=Math.round(g.y),w=Math.round(g.w),h=Math.round(g.h);
    GX.fillStyle='#1a3a1a';GX.fillRect(x,y,w,h);
    GX.fillStyle='#40c060';GX.fillRect(x,y,w,4);
    const cx=x+w/2,cy=y+h/2,rad=g.radius||120;
    GX.strokeStyle='#40c06018';GX.lineWidth=1;
    GX.beginPath();GX.arc(cx,cy,rad,0,Math.PI*2);GX.stroke();
  });

  if(gLv.start)gFlag(gLv.start,PCOL.flagA,'A');
  if(gLv.end)gFlag(gLv.end,PCOL.flagB,'B');
  gParts.forEach(p=>{GX.globalAlpha=Math.max(0,p.life);GX.fillStyle=p.col;GX.beginPath();GX.arc(p.x,p.y,Math.max(0,p.r*p.life),0,Math.PI*2);GX.fill();});
  GX.globalAlpha=1;
  if(!gPlayer.dead)gDrawPlayer();
  GX.restore();
  if(gPlayer&&gPlayer.gravDir!=='d'){
    const c=GF_COLS[gPlayer.gravDir];
    GX.fillStyle=c.stroke+'aa';GX.font='10px "Press Start 2P"';GX.fillText('G '+c.arrow,8,20);
  }
}

let _lastFrameTime=0;
const TARGET_FPS=60;
const FRAME_MS=1000/TARGET_FPS;

function gLoop(now){
  const delta=now-_lastFrameTime;
  const clampedDelta=Math.min(delta,FRAME_MS*3);
  _lastFrameTime=now;
  const steps=Math.round(clampedDelta/FRAME_MS);
  for(let i=0;i<Math.max(1,steps);i++){gUpdate(now);}
  gDraw();
  if(gRunning||gWon)gRafId=requestAnimationFrame(gLoop);
}

// ── Keys ──────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  gKeys[e.code]=true;
  if(['Space','ArrowUp','ArrowLeft','ArrowRight','ArrowDown'].includes(e.code))e.preventDefault();
  if(e.code==='Escape')goToIndex();
});
document.addEventListener('keyup',e=>{
  gKeys[e.code]=false;
  if(JUMP_KEYS.includes(e.code))_jumpReady=true;
});

// ── Sound System ─────────────────────────────────────────
let _audioCtx=null;
function getAudioCtx(){if(!_audioCtx)_audioCtx=new(window.AudioContext||window.webkitAudioContext)();return _audioCtx;}
function playSound(type){
  try{
    const ctx=getAudioCtx();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    if(type==='jump'){osc.type='square';osc.frequency.setValueAtTime(220,ctx.currentTime);osc.frequency.exponentialRampToValueAtTime(440,ctx.currentTime+0.08);gain.gain.setValueAtTime(0.15,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.18);osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.18);}
    else if(type==='step'){osc.type='square';osc.frequency.setValueAtTime(110,ctx.currentTime);osc.frequency.exponentialRampToValueAtTime(80,ctx.currentTime+0.04);gain.gain.setValueAtTime(0.06,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.05);osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.05);}
    else if(type==='land'){osc.type='square';osc.frequency.setValueAtTime(160,ctx.currentTime);osc.frequency.exponentialRampToValueAtTime(60,ctx.currentTime+0.06);gain.gain.setValueAtTime(0.12,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.07);osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.07);}
    else if(type==='die'){osc.type='sawtooth';osc.frequency.setValueAtTime(440,ctx.currentTime);osc.frequency.exponentialRampToValueAtTime(55,ctx.currentTime+0.4);gain.gain.setValueAtTime(0.2,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.4);}
    else if(type==='win'){const notes=[523,659,784,1047];notes.forEach((freq,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='square';const t=ctx.currentTime+i*0.12;o.frequency.setValueAtTime(freq,t);g.gain.setValueAtTime(0.15,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);o.start(t);o.stop(t+0.15);});}
    else if(type==='bounce'){osc.type='sine';osc.frequency.setValueAtTime(300,ctx.currentTime);osc.frequency.exponentialRampToValueAtTime(600,ctx.currentTime+0.1);gain.gain.setValueAtTime(0.18,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.12);osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.12);}
  }catch(e){}
}

let _wasOnGround=false;
let _stepTimer=0;
const _origGUpdate2=gUpdate;
gUpdate=function(now){
  const wasGround=gPlayer?.onGround;
  _origGUpdate2(now);
  if(!gPlayer||gPlayer.dead)return;
  if(!gWon&&!_wasOnGround&&gPlayer.onGround)playSound('land');
  _wasOnGround=gPlayer.onGround;
  if(!gWon&&gPlayer.onGround){
    const moving=Math.abs(gPlayer.vx)>1||Math.abs(gPlayer.vy)>1;
    if(moving){_stepTimer++;if(_stepTimer>=12){playSound('step');_stepTimer=0;}}
    else{_stepTimer=0;}
  }
};

let _jumpSounded=false;
const _checkJump=setInterval(()=>{
  if(!gRunning)return;
  const jump=gKeys['Space']||gKeys['ArrowUp']||gKeys['KeyW'];
  if(jump&&!_jumpSounded&&gPlayer?.onGround){playSound('jump');_jumpSounded=true;}
  if(!jump)_jumpSounded=false;
},16);

const _origKillPlayer=killPlayer;
killPlayer=function(){_origKillPlayer();if(gPlayer?.dead)playSound('die');};

const _origShowWin=showWinScreen;
showWinScreen=function(ms,prevBest,isNewRecord,l){_origShowWin(ms,prevBest,isNewRecord,l);playSound('win');};

document.addEventListener('click',()=>{if(_audioCtx&&_audioCtx.state==='suspended')_audioCtx.resume();},{once:true});
document.addEventListener('keydown',()=>{if(!_audioCtx)getAudioCtx();if(_audioCtx&&_audioCtx.state==='suspended')_audioCtx.resume();},{once:true});

resizeGameCanvas();
init();
</script>

  </div>
  <div style="position:absolute;bottom:24px;left:100px;pointer-events:auto;">

  <div style="position:absolute;bottom:24px;right:20px;pointer-events:auto;">

<style>
.mb-btn{width:56px;height:56px;background:rgba(160,64,240,0.3);border:2px solid rgba(160,64,240,0.6);border-radius:12px;color:#fff;font-size:20px;cursor:pointer;touch-action:none;-webkit-tap-highlight-color:transparent;transition:background .1s;display:flex;align-items:center;justify-content:center;}

.mb-jump{width:72px;height:72px;font-size:28px;background:rgba(240,224,64,0.3);border-color:rgba(240,224,64,0.6);}

</style>

<script>
const isMobile=/Android|iPhone|iPad|iPod|Touch/i.test(navigator.userAgent)||('ontouchstart' in window);
if(isMobile){
  document.getElementById('mobile-controls').style.display='block';
  document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
}
const mbMap={left:'ArrowLeft',right:'ArrowRight',jump:'Space'};
const mbActive=new Set();
function mbDown(dir){
  if(mbActive.has(dir))return;
  mbActive.add(dir);
  const key=mbMap[dir];if(key)gKeys[key]=true;
  const btn=document.getElementById('mb-'+dir);if(btn)btn.classList.add('pressed');
}
function mbUp(dir){
  mbActive.delete(dir);
  const key=mbMap[dir];if(key)gKeys[key]=false;
  const btn=document.getElementById('mb-'+dir);if(btn)btn.classList.remove('pressed');
  if(JUMP_KEYS.includes(key))_jumpReady=true;
}
if(isMobile){
  const observer=new MutationObserver(()=>{
    const anyOv=document.querySelector('.ov.show');
    document.getElementById('mobile-controls').style.display=anyOv?'none':'block';
  });
  document.querySelectorAll('.ov').forEach(el=>observer.observe(el,{attributes:true,attributeFilter:['class']}));
}
</script>
